  anec:'Le navarin printanier est la quintessence du renouveau gastronomique du printemps français. Le mot "navarin" vient soit de "navet" (navet) soit de la bataille de Navarin (1827) selon les théories. C\'est l\'un des plats emblématiques de la gastronomie française bourgeoise du XIXe siècle. La version "printanière" avec légumes nouveaux est la plus festive, célébrée comme un rite de passage saisonnier.'},
 en:{name:'Spring Lamb Navarin',sub:'Classic French cuisine',
  ingr:[['Lamb shoulder, cut up','1 kg'],['Baby turnips','300 g'],['Baby carrots','300 g'],['Fresh peas','200 g'],['New potatoes','300 g'],['Spring onions','8'],['Garlic','3 cloves'],['Crushed tomatoes','200 g'],['Lamb stock','50 cl'],['Bouquet garni','1']],
  prep:'Brown lamb pieces. Set aside. Sauté onions and garlic. Dust with flour, add tomatoes and stock. Return meat, cover, cook 45 min. Add turnips and carrots, cook 20 min. Add potatoes, cook 15 min. Add peas for last 5 minutes. Adjust seasoning. Garnish with parsley.',
  anec:'Spring navarin is the quintessence of France\'s gastronomic spring renewal. The word "navarin" comes either from "navet" (turnip) or the Battle of Navarino (1827) depending on the theory. It\'s one of the emblematic dishes of 19th century French bourgeois gastronomy. The "printanière" version with new vegetables is the most festive, celebrated as a seasonal rite of passage.'}},
{id:35,emoji:'🫚',region:'est',lat:47.32,lng:5.04,
 fr:{name:'Pain d\'Épices de Dijon',sub:'Dijon, Bourgogne',
  ingr:[['Farine de seigle','250 g'],['Farine de blé','100 g'],['Miel de fleurs','350 g'],['Lait tiède','15 cl'],['Bicarbonate de soude','1 c. à café'],['Anis étoilé','2'],['Cannelle','1 c. à café'],['Clous de girofle moulus','1/2 c. à café'],['Cardamome','1/2 c. à café'],['Sel','1 pincée']],
  prep:'Chauffer doucement le miel jusqu\'à liquéfaction. Mélanger farines, bicarbonate, épices, sel. Verser le miel chaud progressivement. Ajouter le lait tiède pour obtenir une pâte souple. Verser dans un moule à cake beurré. Laisser reposer 1h. Cuire 50 min à 160°C. Laisser refroidir 24h avant de déguster — le pain d\'épices se bonifie avec le temps.',
  anec:'Le pain d\'épices est connu en Chine depuis le IXe siècle (mi-kong). Les croisés le ramenèrent en Europe. Dijon devient sa capitale française au XVIIe siècle, bénéficiant des routes commerciales bourguignonnes pour l\'approvisionnement en épices. La Confrérie du Pain d\'Épices de Dijon perpétue la tradition. Le miel de Bourgogne, à base de sarrasin, donne sa couleur ambrée caractéristique.'},
 en:{name:'Dijon Gingerbread',sub:'Dijon, Burgundy',
  ingr:[['Rye flour','250 g'],['Wheat flour','100 g'],['Flower honey','350 g'],['Warm milk','15 cl'],['Baking soda','1 tsp'],['Star anise','2'],['Cinnamon','1 tsp'],['Ground cloves','1/2 tsp'],['Cardamom','1/2 tsp'],['Salt','1 pinch']],
  prep:'Gently heat honey until liquid. Mix flours, baking soda, spices, salt. Gradually pour in hot honey. Add warm milk for a supple dough. Pour into a buttered loaf pan. Rest 1h. Bake 50 min at 160°C. Cool 24h before tasting — gingerbread improves with time.',
  anec:'Gingerbread has been known in China since the 9th century (mi-kong). Crusaders brought it back to Europe. Dijon became France\'s gingerbread capital in the 17th century, benefiting from Burgundian trade routes for spice supply. The Brotherhood of Dijon Gingerbread perpetuates the tradition. Burgundy honey, made from buckwheat, gives its characteristic amber color.'}},
{id:36,emoji:'🦪',region:'ouest',lat:45.88,lng:-1.18,
 fr:{name:'Huîtres Gratinées',sub:'Charente-Maritime, Oléron',
  ingr:[['Huîtres creuses n°3','12'],['Beurre','80 g'],['Échalotes','3'],['Persil','1 bouquet'],['Ail','2 gousses'],['Vin blanc','5 cl'],['Chapelure','50 g'],['Citron','1'],['Gruyère râpé','50 g'],['Sel, poivre','']],
  prep:'Ouvrir les huîtres, récupérer le jus. Préparer un beurre à l\'échalote : suer échalotes et ail au beurre, déglacer au vin blanc, réduire. Ajouter persil haché. Déposer une huître dans chaque demi-coquille. Napper de beurre. Mélanger chapelure et gruyère, parsemer. Gratiner 5 min sous le gril. Servir avec citron.',
  anec:'La France est le premier producteur européen d\'huîtres (100 000 tonnes/an). La côte atlantique (Marennes-Oléron, Arcachon) produit les huîtres creuses les plus réputées. La dégustation à l\'état naturel reste la plus appréciée, mais la version gratinée permet de valoriser les huîtres moins charnues. L\'huître plate (Ostrea edulis) fut quasi exterminée par des maladies dans les années 1970 ; l\'huître creuse japonaise (Crassostrea gigas) l\'a remplacée.'},
 en:{name:'Gratin Oysters',sub:'Charente-Maritime, Oléron',
  ingr:[['Oysters no. 3','12'],['Butter','80 g'],['Shallots','3'],['Parsley','1 bunch'],['Garlic','2 cloves'],['White wine','5 cl'],['Breadcrumbs','50 g'],['Lemon','1'],['Grated Gruyère','50 g'],['Salt, pepper','']],
  prep:'Open oysters, reserve juice. Make shallot butter: sweat shallots and garlic in butter, deglaze with white wine, reduce. Add chopped parsley. Place an oyster in each half-shell. Spoon butter over. Mix breadcrumbs and Gruyère, sprinkle. Broil 5 min. Serve with lemon.',
  anec:'France is Europe\'s top oyster producer (100,000 tonnes/year). The Atlantic coast (Marennes-Oléron, Arcachon) produces the most prized hollow oysters. Natural tasting remains most appreciated, but the gratin version enhances less meaty oysters. The flat oyster (Ostrea edulis) was nearly wiped out by disease in the 1970s; the Japanese hollow oyster (Crassostrea gigas) replaced it.'}},
{id:37,emoji:'🍰',region:'ouest',lat:48.35,lng:-4.49,
 fr:{name:'Kouign-Amann',sub:'Douarnenez, Bretagne',
  ingr:[['Farine','250 g'],['Levure boulangère sèche','7 g'],['Eau tiède','15 cl'],['Sel','1 c. à café'],['Beurre demi-sel froid','200 g'],['Sucre','150 g']],
  prep:'Faire une pâte à pain (farine, levure, eau, sel), pétrir 10 min. Reposer 1h. Étaler en rectangle. Parsemer de morceaux de beurre froid et sucre. Plier en 3, puis en 3 de nouveau. Étaler dans un moule beurré et sucré. Laisser pointer 30 min. Cuire 35 min à 200°C jusqu\'à caramélisation spectaculaire.',
  anec:'Le kouign-amann (prononcer "kouign amann", qui signifie "gâteau beurre" en breton) fut inventé en 1860 par Yves-René Scordia, boulanger à Douarnenez. La légende dit qu\'à court de pâte à viennoiserie, il utilisa de la pâte à pain avec beaucoup de beurre et de sucre. Ce gâteau rustique est devenu l\'un des symboles de la pâtisserie bretonne et connaît un succès mondial depuis les années 2000.'},
 en:{name:'Kouign-Amann',sub:'Douarnenez, Brittany',
  ingr:[['Flour','250 g'],['Dry baker\'s yeast','7 g'],['Warm water','15 cl'],['Salt','1 tsp'],['Cold salted butter','200 g'],['Sugar','150 g']],
  prep:'Make a bread dough (flour, yeast, water, salt), knead 10 min. Rest 1h. Roll into rectangle. Scatter cold butter pieces and sugar. Fold in 3, then fold in 3 again. Press into a buttered, sugared pan. Prove 30 min. Bake 35 min at 200°C until spectacular caramelization.',
  anec:'Kouign-amann (pronounced "kouign amann", meaning "butter cake" in Breton) was invented in 1860 by Yves-René Scordia, a baker in Douarnenez. Legend says that short of pastry dough, he used bread dough with lots of butter and sugar. This rustic cake has become one of the symbols of Breton pastry and has enjoyed worldwide success since the 2000s.'}},
{id:38,emoji:'🍲',region:'sud-est',lat:43.7,lng:5.38,
 fr:{name:'Daube Provençale',sub:'Provence',
  ingr:[['Bœuf (joue ou gîte)','1.2 kg'],['Vin rouge de Provence','75 cl'],['Lardons','150 g'],['Carottes','3'],['Oignons','2'],['Ail','5 gousses'],['Tomates concassées','300 g'],['Olives noires','100 g'],['Zeste d\'orange','1'],['Thym, laurier, romarin',''],['Poivre en grains, girofle','']],
  prep:'Mariner le bœuf 24h dans le vin avec légumes et aromates. Égoutter. Dans une daubière en terre, alterner couches de viande et légumes. Ajouter tomates, olives, zeste d\'orange, épices. Mouiller avec la marinade. Fermer hermétiquement. Cuire 4h à 150°C. Servir le lendemain réchauffé — la daube est meilleure le jour suivant.',
  anec:'La daube (du provençal "dobba") se cuit dans une daubière, un récipient en terre cuite ventru typique de Provence. La cuisson lente à l\'étouffée concentre les saveurs et attendrit les viandes les plus fermes. Virginia Woolf lui consacre une scène mémorable dans "La Promenade au phare" (1927). La daube froide, gélifiée, est également consommée en terrine, surtout en été.'},
 en:{name:'Provençal Daube',sub:'Provence',
  ingr:[['Beef (cheek or shin)','1.2 kg'],['Provence red wine','75 cl'],['Lardons','150 g'],['Carrots','3'],['Onions','2'],['Garlic','5 cloves'],['Crushed tomatoes','300 g'],['Black olives','100 g'],['Orange zest','1'],['Thyme, bay, rosemary',''],['Peppercorns, cloves','']],
  prep:'Marinate beef 24h in wine with vegetables and aromatics. Drain. In a clay daubière, alternate layers of meat and vegetables. Add tomatoes, olives, orange zest, spices. Cover with marinade. Seal tightly. Cook 4h at 150°C. Serve the next day reheated — daube is better the following day.',
  anec:'Daube (from Provençal "dobba") cooks in a daubière, a typical round-bellied earthenware vessel from Provence. Slow, sealed cooking concentrates flavors and tenderizes the firmest meats. Virginia Woolf devoted a memorable scene to it in "To the Lighthouse" (1927). Cold daube, jellied, is also eaten as terrine, especially in summer.'}},
{id:39,emoji:'🫓',region:'sud-est',lat:43.7,lng:7.27,
 fr:{name:'Socca Niçoise',sub:'Nice, Côte d\'Azur',
  ingr:[['Farine de pois chiches','250 g'],['Eau','50 cl'],['Huile d\'olive','6 c. à soupe'],['Sel','1 c. à café'],['Poivre noir concassé',''],['Romarin (facultatif)','']],
  prep:'Mélanger farine de pois chiches avec l\'eau froide progressivement pour éviter les grumeaux. Ajouter 4 c. d\'huile et le sel. Reposer 1h. Huiler généreusement une plaque en métal (idéalement en cuivre). Verser la pâte très finement (3-4 mm). Cuire sous le gril très chaud 10-12 min jusqu\'aux bords brûlés typiques. Poivrer généreusement. Servir brûlant.',
  anec:'La socca est la street food emblématique de Nice, vendue depuis des siècles dans les rues du Vieux-Nice par des vendeurs ambulants. Elle est cuite dans des fours au feu de bois sur de grandes plaques de cuivre. Sa parentèle méditerranéenne est large : la farinata génoise, la panisse marseillaise. Nice, longtemps italienne (jusqu\'en 1860), a conservé cette tradition de la farine de pois chiches héritée de Gênes.'},
 en:{name:'Niçoise Socca',sub:'Nice, Côte d\'Azur',
  ingr:[['Chickpea flour','250 g'],['Water','50 cl'],['Olive oil','6 tbsp'],['Salt','1 tsp'],['Cracked black pepper',''],['Rosemary (optional)','']],
  prep:'Mix chickpea flour with cold water gradually to avoid lumps. Add 4 tbsp oil and salt. Rest 1h. Generously oil a metal pan (ideally copper). Pour batter very thin (3-4 mm). Cook under very hot grill 10-12 min until typical burnt edges. Pepper generously. Serve piping hot.',
  anec:'Socca is Nice\'s emblematic street food, sold for centuries in Old Nice\'s streets by street vendors. It is baked in wood-fired ovens on large copper pans. Its Mediterranean relatives are numerous: Genoese farinata, Marseille panisse. Nice, long Italian (until 1860), preserved this chickpea flour tradition inherited from Genoa.'}},
{id:40,emoji:'🍲',region:'sud-ouest',lat:43.3,lng:-0.37,
 fr:{name:'Garbure Gasconne',sub:'Gascogne, Béarn',
  ingr:[['Chou vert','1/2'],['Haricots blancs','200 g'],['Carottes','3'],['Navets','2'],['Poireaux','2'],['Pommes de terre','3'],['Confit de canard','2 cuisses'],['Lard fumé','200 g'],['Saucisse de pays','2'],['Ail','4 gousses'],['Thym, laurier','']],
  prep:'Faire tremper les haricots 12h. Dans une grande marmite, couvrir le lard de 3 litres d\'eau froide. Porter à ébullition, écumer. Ajouter légumes (sauf chou et pommes de terre), ail, aromates. Cuire 1h. Ajouter chou, pommes de terre, haricots égouttés. Cuire 40 min. Ajouter confit et saucisses les 20 dernières minutes. Rectifier, servir bouillant.',
  anec:'La garbure est le plat rustique du Béarn et de Gascogne, cousine du cassoulet et du pot-au-feu. Le mot vient du gascon "garbe" (gerbe). C\'est une soupe-ragoût paysanne, consistante, qui tirait son nom de l\'abondance des légumes "en gerbe". La tradition veut qu\'on "fasse chabrot" en fin de repas : verser du vin rouge dans le fond de son assiette avec les dernières gouttes de bouillon.'},
 en:{name:'Gascon Garbure',sub:'Gascony, Béarn',
  ingr:[['Green cabbage','1/2'],['White beans','200 g'],['Carrots','3'],['Turnips','2'],['Leeks','2'],['Potatoes','3'],['Duck confit','2 legs'],['Smoked bacon','200 g'],['Country sausage','2'],['Garlic','4 cloves'],['Thyme, bay leaf','']],
  prep:'Soak beans 12h. In a large pot, cover bacon with 3 litres cold water. Bring to boil, skim. Add vegetables (except cabbage and potatoes), garlic, aromatics. Cook 1h. Add cabbage, potatoes, drained beans. Cook 40 min. Add confit and sausages for last 20 minutes. Adjust, serve boiling.',
  anec:'Garbure is the rustic dish of Béarn and Gascony, cousin of cassoulet and pot-au-feu. The word comes from Gascon "garbe" (sheaf). It is a hearty peasant soup-stew named for the abundance of vegetables "in a sheaf". Tradition calls for "faire chabrot" at meal\'s end: pouring red wine into the last drops of broth remaining in the bowl.'}},


{id:41,emoji:'🍮',region:'centre',lat:47.4,lng:0.68,
 fr:{name:'Île Flottante',sub:'Cuisine française classique',
  ingr:[['Blancs d\'œufs','4'],['Sucre (meringue)','120 g'],['Crème anglaise (jaunes 4, sucre 80g, lait 50cl, vanille)',''],['Amandes effilées grillées','50 g'],['Caramel (sucre 100g)',''],['Sel','1 pincée']],
  prep:'Crème anglaise : chauffer lait et vanille. Blanchir jaunes et sucre. Verser lait chaud, cuire à 82°C (à la nappe). Réfrigérer. Meringues : monter les blancs avec sel, ajouter sucre progressivement. Pocher à la cuillère dans de l\'eau frémissante 2 min par côté. Ou cuire au four 100°C 1h. Servir meringues flottant sur crème anglaise. Napper de caramel, parsemer d\'amandes.',
  anec:'L\'île flottante (ou "œufs à la neige") est un dessert emblématique de la cuisine familiale française depuis le XVIIIe siècle. La distinction entre "île flottante" (meringue pochée) et "œufs à la neige" (meringue cuite au four) est souvent confondue. Ce dessert aérien et réconfortant figure dans "La Cuisinière de la campagne et de la ville" de Louis-Eustache Audot (1818), l\'un des grands classiques culinaires français.'},
 en:{name:'Floating Island',sub:'Classic French cuisine',
  ingr:[['Egg whites','4'],['Sugar (meringue)','120 g'],['Crème anglaise (4 yolks, 80g sugar, 50cl milk, vanilla)',''],['Toasted sliced almonds','50 g'],['Caramel (100g sugar)',''],['Salt','1 pinch']],
  prep:'Crème anglaise: heat milk and vanilla. Whisk yolks and sugar. Pour hot milk over, cook to 82°C (coating consistency). Refrigerate. Meringues: whip whites with salt, gradually add sugar. Poach spoonfuls in simmering water 2 min each side. Or bake at 100°C 1h. Serve meringues floating on crème anglaise. Drizzle caramel, scatter almonds.',
  anec:'Floating island (or "œufs à la neige") has been an emblematic French family dessert since the 18th century. The distinction between "île flottante" (poached meringue) and "œufs à la neige" (baked meringue) is often confused. This airy, comforting dessert appears in Louis-Eustache Audot\'s "La Cuisinière de la campagne et de la ville" (1818), one of the great French culinary classics.'}},
{id:42,emoji:'🍖',region:'centre',lat:44.35,lng:2.57,
 fr:{name:'Tripoux Aveyronnais',sub:'Aveyron, Rouergue',
  ingr:[['Tripoux (paquets de panse et pieds de mouton)','1 kg'],['Vin blanc de pays','20 cl'],['Tomates','3'],['Oignons','2'],['Ail','4 gousses'],['Carottes','2'],['Bouquet garni','1'],['Lardons','100 g'],['Persil, thym',''],['Sel, poivre','']],
  prep:'Faire revenir oignons et lardons. Ajouter ail, tomates concassées. Déposer les tripoux. Mouiller au vin blanc et eau à hauteur. Ajouter carottes, bouquet garni. Couvrir hermétiquement. Cuire 3h à 160°C ou 2h à la cocotte-minute. La viande doit être fondante. Servir avec des pommes de terre vapeur et persil haché.',
  anec:'Les tripoux (ou "tripous") sont un plat de tradition aveyronnaise à base d\'abats de mouton (panse, pieds) ficelés en petits paquets. Ce plat de pauvres, né de la nécessité de tout utiliser de l\'animal, est devenu une fierté régionale. La foire aux tripoux d\'Aurillac est un événement majeur. En Auvergne, on dit que "celui qui n\'a pas mangé de tripoux ne connaît pas le vrai goût de la terre."'},
 en:{name:'Aveyronnais Tripoux',sub:'Aveyron, Rouergue',
  ingr:[['Tripoux (sheep tripe and feet packets)','1 kg'],['Country white wine','20 cl'],['Tomatoes','3'],['Onions','2'],['Garlic','4 cloves'],['Carrots','2'],['Bouquet garni','1'],['Lardons','100 g'],['Parsley, thyme',''],['Salt, pepper','']],
  prep:'Sauté onions and lardons. Add garlic, crushed tomatoes. Place tripoux. Cover with white wine and water. Add carrots, bouquet garni. Seal tightly. Cook 3h at 160°C or 2h in pressure cooker. Meat should be meltingly tender. Serve with steamed potatoes and chopped parsley.',
  anec:'Tripoux are a traditional Aveyron dish made from sheep offal (tripe, feet) tied into small packets. This peasant dish, born from necessity to use every part of the animal, became a regional pride. The Aurillac tripoux fair is a major event. In Auvergne, they say "he who has not eaten tripoux does not know the true taste of the earth."'}},
{id:43,emoji:'🧁',region:'ouest',lat:46.67,lng:-1.43,
 fr:{name:'Brioche Vendéenne',sub:'Vendée, Pays de la Loire',
  ingr:[['Farine T45','500 g'],['Beurre doux','200 g'],['Œufs','4'],['Sucre','80 g'],['Levure fraîche','20 g'],['Lait tiède','5 cl'],['Fleur d\'oranger','2 c. à soupe'],['Rhum ambré','1 c. à soupe'],['Sel','8 g'],['Jaune d\'œuf (dorure)','']],
  prep:'Délayer la levure dans le lait tiède. Mélanger farine, sucre, sel. Ajouter œufs, levure, arômes. Pétrir 15 min. Incorporer le beurre coupé en dés progressivement. Pétrir 10 min. Laisser pousser 2h. Rompre la pâte, façonner en tresse. Dorer. Laisser pousser 1h30. Dorer à nouveau. Cuire 30 min à 170°C.',
  anec:'La brioche vendéenne est une spécialité incontournable des Pâques en Vendée. Sa caractéristique principale est l\'arôme de fleur d\'oranger et de rhum qui la distingue des brioches parisiennes. Tressée en 3 ou 4 brins, elle symbolise les liens familiaux. La tradition veut qu\'on la prépare le Vendredi Saint pour la déguster le dimanche de Pâques. Les Vendéens l\'appellent affectueusement "la gâche".'},
 en:{name:'Vendée Brioche',sub:'Vendée, Loire Valley',
  ingr:[['T45 flour','500 g'],['Unsalted butter','200 g'],['Eggs','4'],['Sugar','80 g'],['Fresh yeast','20 g'],['Warm milk','5 cl'],['Orange blossom water','2 tbsp'],['Aged rum','1 tbsp'],['Salt','8 g'],['Egg yolk (glaze)','']],
  prep:'Dissolve yeast in warm milk. Mix flour, sugar, salt. Add eggs, yeast, flavorings. Knead 15 min. Gradually incorporate diced butter. Knead 10 min. Prove 2h. Knock back dough, braid. Glaze. Prove 1h30. Glaze again. Bake 30 min at 170°C.',
  anec:'Vendée brioche is an essential Easter specialty in Vendée. Its main characteristic is the orange blossom and rum aroma that distinguishes it from Parisian brioches. Braided in 3 or 4 strands, it symbolizes family bonds. Tradition calls for preparing it on Good Friday to eat on Easter Sunday. Vendéens affectionately call it "la gâche".'}},
{id:44,emoji:'🐟',region:'est',lat:45.9,lng:6.12,
 fr:{name:'Truite aux Amandes',sub:'Savoie, Rhône-Alpes',
  ingr:[['Truites portion (300g)','4'],['Amandes effilées','100 g'],['Beurre','100 g'],['Citron','2'],['Farine','4 c. à soupe'],['Persil plat','1 bouquet'],['Huile neutre','2 c. à soupe'],['Sel, poivre','']],
  prep:'Fariner les truites. Les faire dorer dans beurre et huile, 5 min par côté. Réserver au chaud. Dans la même poêle, faire dorer les amandes à sec 3 min. Ajouter 60g de beurre, laisser noisetter. Presser le citron, ajouter persil haché. Verser ce beurre aux amandes sur les truites. Servir immédiatement avec des pommes vapeur.',
  anec:'La truite aux amandes est l\'un des classiques de la cuisine de bistrot et de montagne français. Les truites des torrents de Savoie et du Dauphiné étaient abondantes jusqu\'au XXe siècle. La truite arc-en-ciel d\'élevage a largement remplacé la truite fario sauvage dans les restaurants. Le "beurre noisette" (beurre chauffé jusqu\'à prendre une teinte et un arôme de noisette) est une technique fondamentale de la cuisine française.'},
 en:{name:'Trout with Almonds',sub:'Savoie, Rhône-Alpes',
  ingr:[['Portion trout (300g)','4'],['Sliced almonds','100 g'],['Butter','100 g'],['Lemons','2'],['Flour','4 tbsp'],['Flat parsley','1 bunch'],['Neutral oil','2 tbsp'],['Salt, pepper','']],
  prep:'Flour the trout. Brown in butter and oil, 5 min each side. Keep warm. In same pan, dry-toast almonds 3 min. Add 60g butter, cook to hazelnut brown. Squeeze lemon, add chopped parsley. Pour this almond butter over trout. Serve immediately with steamed potatoes.',
  anec:'Trout with almonds is one of the classics of French bistrot and mountain cuisine. Savoie and Dauphiné mountain stream trout were abundant until the 20th century. Farmed rainbow trout has largely replaced wild brown trout in restaurants. "Beurre noisette" (butter heated until it takes on a hazelnut color and aroma) is a fundamental technique in French cuisine.'}},
{id:45,emoji:'🍬',region:'sud-est',lat:44.55,lng:4.75,
 fr:{name:'Nougat de Montélimar',sub:'Montélimar, Drôme',
  ingr:[['Miel de lavande','300 g'],['Sucre','200 g'],['Glucose','50 g'],['Eau','5 cl'],['Blancs d\'œufs','2'],['Amandes entières grillées','200 g'],['Pistaches','80 g'],['Feuilles de pain azyme',''],['Beurre de cacao','20 g']],
  prep:'Cuire sucre, glucose et eau à 145°C. Simultanément, cuire le miel à 130°C. Monter les blancs en neige. Verser d\'abord le miel chaud en filet sur les blancs en fouettant. Puis verser le sirop à 145°C. Incorporer beurre de cacao, amandes chaudes, pistaches. Étaler entre feuilles azyme. Laisser cristalliser 12h. Découper en tranches.',
  anec:'La réputation de Montélimar comme capitale du nougat remonte au XVIIe siècle, grâce aux amandiers et aux lavandes abondants dans la région. L\'ordonnance royale de Louis XIV imposait la culture d\'amandiers à Montélimar. Le nougat AOC "Nougat de Montélimar" doit contenir 28% d\'amandes et 2% de pistaches minimum. La confiserie Chabert & Guillot perpétue la tradition depuis 1848.'},
 en:{name:'Montélimar Nougat',sub:'Montélimar, Drôme',
  ingr:[['Lavender honey','300 g'],['Sugar','200 g'],['Glucose','50 g'],['Water','5 cl'],['Egg whites','2'],['Toasted whole almonds','200 g'],['Pistachios','80 g'],['Rice paper sheets',''],['Cocoa butter','20 g']],
  prep:'Cook sugar, glucose and water to 145°C. Simultaneously, cook honey to 130°C. Whip egg whites to stiff peaks. Pour hot honey in a thin stream over whites while whipping. Then pour 145°C syrup. Fold in cocoa butter, warm almonds, pistachios. Spread between rice paper. Let crystallize 12h. Slice.',
  anec:'Montélimar\'s reputation as nougat capital dates from the 17th century, thanks to the region\'s abundant almond trees and lavender. Louis XIV\'s royal ordinance required almond tree cultivation in Montélimar. AOC "Nougat de Montélimar" must contain minimum 28% almonds and 2% pistachios. The Chabert & Guillot confectionery has perpetuated the tradition since 1848.'}},
{id:46,emoji:'🫑',region:'sud-ouest',lat:43.48,lng:-1.56,
 fr:{name:'Piperade Basque',sub:'Pays Basque',
  ingr:[['Poivrons rouges','3'],['Poivrons verts','2'],['Tomates mûres','4'],['Oignons','2'],['Ail','3 gousses'],['Piment d\'Espelette','1 c. à café'],['Jambon de Bayonne','6 tranches fines'],['Œufs','4'],['Huile d\'olive','4 c. à soupe'],['Sel','']],
  prep:'Faire revenir oignons et ail dans l\'huile. Ajouter poivrons en lanières, cuire 15 min. Ajouter tomates pelées et épépinées, piment d\'Espelette. Cuire 20 min à feu doux jusqu\'à compotage. Faire dorer le jambon séparément. Battre les œufs, les incorporer à la piperade hors du feu, mélanger doucement pour obtenir des œufs brouillés fondants. Servir avec le jambon.',
  anec:'La piperade (du basque "piperrak", poivrons) est le plat national du Pays Basque. Elle illustre parfaitement l\'identité culinaire basque : poivrons doux, tomates et piment d\'Espelette, ce piment AOP cultivé dans 10 communes autour d\'Espelette. Le piment d\'Espelette, introduit d\'Amérique centrale au XVIe siècle, remplace le poivre noir dans toute la cuisine basque. La piperade accompagne œufs, jambon, poisson ou poulet.'},
 en:{name:'Basque Piperade',sub:'Basque Country',
  ingr:[['Red peppers','3'],['Green peppers','2'],['Ripe tomatoes','4'],['Onions','2'],['Garlic','3 cloves'],['Espelette pepper','1 tsp'],['Bayonne ham','6 thin slices'],['Eggs','4'],['Olive oil','4 tbsp'],['Salt','']],
  prep:'Sauté onions and garlic in oil. Add pepper strips, cook 15 min. Add peeled, seeded tomatoes, Espelette pepper. Cook 20 min on low until compote-like. Brown ham separately. Beat eggs, fold into piperade off heat, stir gently for soft scrambled eggs. Serve with ham.',
  anec:'Piperade (from Basque "piperrak", peppers) is the Basque Country\'s national dish. It perfectly illustrates Basque culinary identity: sweet peppers, tomatoes and Espelette pepper, this AOP chili grown in 10 communes around Espelette. Espelette pepper, introduced from Central America in the 16th century, replaces black pepper throughout Basque cuisine. Piperade accompanies eggs, ham, fish or chicken.'}},
{id:47,emoji:'🥩',region:'est',lat:48.0,lng:5.0,
 fr:{name:'Paupiettes de Veau',sub:'Bourgogne, Cuisine classique',
  ingr:[['Escalopes de veau fines','4'],['Farce (chair à saucisse 150g, champignons 100g, échalotes, persil)',''],['Lardons fins','8 tranches'],['Beurre','50 g'],['Vin blanc','15 cl'],['Fond de veau','20 cl'],['Carottes','2'],['Oignon','1'],['Bouquet garni','1'],['Ficelle de cuisine','']],
  prep:'Préparer la farce : mélanger chair à saucisse, champignons hachés, échalotes et persil sautés. Aplatir les escalopes, garnir de farce, rouler et ficeler. Entourer de lardons. Colorer dans le beurre. Ajouter légumes, mouiller au vin blanc et fond de veau. Braiser 45 min à couvert à 160°C. Servir nappé de sauce réduite.',
  anec:'La paupiette (de l\'occitan "paupiet", petite bouchée) est un apprêt classique qui permet de présenter une viande roulée avec une farce. Ce mode de préparation date du Moyen Âge et figure dans tous les grands livres de cuisine classique. L\'art du ficelage est une technique que les bouchers et charcutiers français maîtrisent depuis des générations. Les paupiettes illustrent le génie culinaire français : transformer un morceau modeste en plat élégant.'},
 en:{name:'Veal Paupiettes',sub:'Burgundy, Classic cuisine',
  ingr:[['Thin veal escalopes','4'],['Stuffing (150g sausagemeat, 100g mushrooms, shallots, parsley)',''],['Thin lardons','8 slices'],['Butter','50 g'],['White wine','15 cl'],['Veal stock','20 cl'],['Carrots','2'],['Onion','1'],['Bouquet garni','1'],['Kitchen string','']],
  prep:'Prepare stuffing: mix sausagemeat, chopped mushrooms, sautéed shallots and parsley. Flatten escalopes, fill with stuffing, roll and tie. Wrap with lardons. Brown in butter. Add vegetables, deglaze with white wine and veal stock. Braise 45 min covered at 160°C. Serve with reduced sauce.',
  anec:'Paupiette (from Occitan "paupiet", small bite) is a classic preparation presenting rolled meat with a stuffing. This cooking method dates from the Middle Ages and appears in all major classic cookbooks. The art of trussing is a technique French butchers and charcutiers have mastered for generations. Paupiettes illustrate French culinary genius: transforming a modest cut into an elegant dish.'}},
{id:48,emoji:'🦞',region:'ouest',lat:47.22,lng:-1.55,
 fr:{name:'Bisque de Homard',sub:'Bretagne, Normandie',
  ingr:[['Carcasses et têtes de homard','500 g'],['Carottes','2'],['Oignon','1'],['Céleri','2 branches'],['Tomates concassées','200 g'],['Cognac','6 cl'],['Vin blanc','20 cl'],['Crème fraîche','20 cl'],['Beurre','60 g'],['Farine','30 g'],['Estragon, thym, laurier',''],['Piment de Cayenne','']],
  prep:'Concasser les carcasses. Les faire revenir vigoureusement dans le beurre. Flamber au cognac. Ajouter légumes, faire revenir. Singer. Ajouter tomates, vin blanc, eau, aromates. Cuire 30 min. Mixer, passer au tamis fin. Remettre sur feu, ajouter crème. Assaisonner avec sel, poivre, piment de Cayenne. Finir avec beurre monté.',
  anec:'La bisque est une des sauces les plus raffinées de la cuisine française, tirée des carcasses de crustacés. Menagier de Paris (1393) mentionne une "besque" de crabe. Le terme "bisque" viendrait de Biscaye (golfe de Gascogne), réputé pour ses crustacés. Auguste Escoffier codifie la bisque moderne. Elle symbolise l\'art français du recyclage gastronomique : rien n\'est perdu, même les coquilles servent à créer de la saveur.'},
 en:{name:'Lobster Bisque',sub:'Brittany, Normandy',
  ingr:[['Lobster shells and heads','500 g'],['Carrots','2'],['Onion','1'],['Celery','2 stalks'],['Crushed tomatoes','200 g'],['Cognac','6 cl'],['White wine','20 cl'],['Crème fraîche','20 cl'],['Butter','60 g'],['Flour','30 g'],['Tarragon, thyme, bay leaf',''],['Cayenne pepper','']],
  prep:'Crush shells. Vigorously sauté in butter. Flambé with cognac. Add vegetables, sauté. Dust with flour. Add tomatoes, white wine, water, aromatics. Cook 30 min. Blend, pass through fine sieve. Return to heat, add cream. Season with salt, pepper, cayenne. Finish with mounted butter.',
  anec:'Bisque is one of the most refined sauces in French cuisine, drawn from crustacean shells. Le Menagier de Paris (1393) mentions a crab "besque". The term "bisque" may come from Biscay (Bay of Gascony), renowned for its shellfish. Auguste Escoffier codified the modern bisque. It symbolizes the French art of gastronomic recycling: nothing is wasted, even shells create flavor.'}},
{id:49,emoji:'🧁',region:'sud-ouest',lat:44.84,lng:-0.57,
 fr:{name:'Cannelés Bordelais',sub:'Bordeaux, Gironde',
  ingr:[['Lait entier','50 cl'],['Sucre','250 g'],['Farine','100 g'],['Œufs','2 + 2 jaunes'],['Beurre fondu','50 g'],['Rhum ambré','5 cl'],['Extrait de vanille','1 c. à café'],['Cire d\'abeille ou beurre (moules)','']],
  prep:'Faire bouillir lait et beurre. Mélanger sucre et farine. Ajouter œufs et jaunes. Verser le lait chaud progressivement. Ajouter rhum et vanille. Reposer 24h au réfrigérateur (essentiel). Badigeonner les moules en cuivre de cire d\'abeille. Cuire à 250°C pendant 10 min puis 175°C pendant 50 min. L\'extérieur doit être brun sombre, l\'intérieur alvéolé et fondant.',
  anec:'Les cannelés (ou "canelés") sont une spécialité bordelaise dont l\'origine est disputée. Une légende les attribue aux moines Annonciades du XVIIIe siècle qui utilisaient les jaunes d\'œufs laissés par les viticulteurs (qui clarifiaient le vin avec les blancs). La vogue des cannelés éclate dans les années 1980 à Paris. Les vrais cannelés se font dans des moules en cuivre qui coûtent cher mais sont indispensables pour la caramélisation parfaite.'},
 en:{name:'Bordeaux Cannelés',sub:'Bordeaux, Gironde',
  ingr:[['Whole milk','50 cl'],['Sugar','250 g'],['Flour','100 g'],['Eggs','2 + 2 yolks'],['Melted butter','50 g'],['Aged rum','5 cl'],['Vanilla extract','1 tsp'],['Beeswax or butter (moulds)','']],
  prep:'Boil milk and butter. Mix sugar and flour. Add eggs and yolks. Pour hot milk in gradually. Add rum and vanilla. Rest 24h in refrigerator (essential). Brush copper moulds with beeswax. Bake at 250°C for 10 min then 175°C for 50 min. Exterior should be dark brown, interior honeycomb-like and custardy.',
  anec:'Cannelés are a Bordeaux specialty whose origin is disputed. Legend attributes them to 18th century Annonciade nuns who used egg yolks left over from winemakers (who clarified wine with whites). The cannelé craze exploded in Paris in the 1980s. True cannelés require copper moulds which are expensive but essential for perfect caramelization.'}},
{id:50,emoji:'🧀',region:'centre',lat:44.7,lng:2.8,
 fr:{name:'Aligot Aubracois',sub:'Aubrac, Aveyron',
  ingr:[['Pommes de terre à chair fondante','1 kg'],['Tome fraîche de Laguiole','500 g'],['Beurre','80 g'],['Crème fraîche épaisse','10 cl'],['Ail','2 gousses'],['Sel, poivre blanc','']],
  prep:'Cuire les pommes de terre à l\'eau salée. Écraser finement avec beurre, crème, ail. Poivrer. Faire chauffer à feu doux. Ajouter la tome fraîche coupée en lamelles. Incorporer en tournant sans arrêt dans un sens : l\'aligot doit filer et former de longs rubans élastiques. Ce travail prend 10-15 min. Servir immédiatement.',
  anec:'L\'aligot est né dans les monastères de l\'Aubrac au Moyen Âge. Les moines de la dômerie d\'Aubrac nourrissaient les pèlerins sur la route de Saint-Jacques-de-Compostelle avec cette "aligot" (du latin "aliquid", quelque chose). La tome fraîche de Laguiole (ou d\'Aubrac) est indispensable : c\'est une tome non affinée, différente de la tomme de Savoie. L\'aligot est aujourd\'hui symbole de la culture aveyronnaise et servi à toutes les fêtes de village.'},
 en:{name:'Aligot Aubracois',sub:'Aubrac, Aveyron',
  ingr:[['Waxy potatoes','1 kg'],['Fresh tome de Laguiole cheese','500 g'],['Butter','80 g'],['Thick crème fraîche','10 cl'],['Garlic','2 cloves'],['Salt, white pepper','']],
  prep:'Cook potatoes in salted water. Mash finely with butter, cream, garlic. Season with pepper. Heat on low. Add fresh tome cut in thin strips. Incorporate by stirring constantly in one direction: the aligot should stretch and form long elastic ribbons. This takes 10-15 min. Serve immediately.',
  anec:'Aligot was born in Aubrac monasteries in the Middle Ages. The monks of Aubrac\'s dômerie fed pilgrims on the Santiago de Compostela route with this "aligot" (from Latin "aliquid", something). Fresh tome de Laguiole (or d\'Aubrac) is essential: it is an unaged tome, different from Savoie tomme. Aligot is today the symbol of Aveyronnais culture, served at all village festivals.'}},


{id:51,emoji:'🍚',region:'paris',lat:48.86,lng:2.34,
 fr:{name:'Gâteau de Riz',sub:'Cuisine française classique',
  ingr:[['Riz rond','150 g'],['Lait entier','75 cl'],['Sucre','100 g'],['Œufs','3'],['Jaunes d\'œufs','2'],['Vanille','1 gousse'],['Beurre','20 g'],['Caramel (sucre 80g + eau 2 c. à soupe)',''],['Sel','1 pincée']],
  prep:'Cuire le riz 5 min à l\'eau bouillante, égoutter. Faire chauffer le lait avec la vanille. Ajouter le riz, cuire 25 min à feu doux en remuant. Hors du feu, incorporer sucre, beurre, œufs et jaunes battus. Préparer un caramel à sec, le couler dans un moule. Verser l\'appareil au riz. Cuire au bain-marie 40 min à 160°C. Laisser refroidir, démouler.',
  anec:'Le gâteau de riz est un dessert emblématique de la cuisine bourgeoise française du XIXe siècle, présent dans tous les livres de cuisine de l\'époque. Il est la déclinaison sucrée du riz au lait, enrichi d\'œufs pour lui donner une tenue ferme. Chaque famille française possède sa propre recette, transmise de génération en génération. Sa simplicité et son économie en ont fait le dessert du dimanche par excellence dans les foyers modestes.'},
 en:{name:'Rice Pudding Cake',sub:'Classic French cuisine',
  ingr:[['Round rice','150 g'],['Whole milk','75 cl'],['Sugar','100 g'],['Eggs','3'],['Egg yolks','2'],['Vanilla','1 pod'],['Butter','20 g'],['Caramel (80g sugar + 2 tbsp water)',''],['Salt','1 pinch']],
  prep:'Boil rice 5 min, drain. Heat milk with vanilla. Add rice, cook 25 min on low heat stirring. Off heat, fold in sugar, butter, beaten eggs and yolks. Make a dry caramel, pour into mould. Add rice mixture. Bake in water bath 40 min at 160°C. Cool, unmould.',
  anec:'Rice pudding cake is an emblematic dessert of 19th century French bourgeois cuisine, found in all cookbooks of the era. It is the sweet version of rice pudding, enriched with eggs for a firm texture. Every French family has its own recipe passed down through generations. Its simplicity and economy made it the quintessential Sunday dessert in modest households.'}},
{id:52,emoji:'🍫',region:'paris',lat:48.85,lng:2.33,
 fr:{name:'Profiteroles',sub:'Paris, Cuisine française classique',
  ingr:[['Pâte à choux (eau 25cl, beurre 80g, farine 150g, œufs 4)',''],['Glace à la vanille','500 g'],['Chocolat noir (70%)','200 g'],['Crème fleurette','15 cl'],['Beurre','20 g'],['Sucre glace',''],['Amandes effilées grillées (facultatif)','']],
  prep:'Réaliser la pâte à choux. Pocher des petits choux (3 cm) sur plaque beurrée. Dorer au jaune d\'œuf. Cuire 25 min à 180°C sans ouvrir. Laisser refroidir. Faire fondre chocolat, crème et beurre au bain-marie pour la sauce chaude. Fendre les choux, les garnir de glace vanille. Dresser en pyramide, napper de sauce chocolat chaude au moment de servir.',
  anec:'Les profiteroles apparaissent dans les livres de cuisine français dès le XVIe siècle sous le nom de "petits choux". La sauce au chocolat chaud coulant sur la glace crée un contraste chaud-froid fascinant. Ce dessert est indissociable des bistrots parisiens depuis les années 1950. Le secret réside dans le contraste de températures : la sauce chocolat doit être brûlante et la glace bien froide au moment du service.'},
 en:{name:'Profiteroles',sub:'Paris, Classic French cuisine',
  ingr:[['Choux pastry (water 25cl, butter 80g, flour 150g, eggs 4)',''],['Vanilla ice cream','500 g'],['Dark chocolate (70%)','200 g'],['Heavy cream','15 cl'],['Butter','20 g'],['Powdered sugar',''],['Toasted sliced almonds (optional)','']],
  prep:'Make choux pastry. Pipe small puffs (3 cm) onto buttered tray. Glaze with egg yolk. Bake 25 min at 180°C without opening. Cool. Melt chocolate, cream and butter in a double boiler for the hot sauce. Slit puffs, fill with vanilla ice cream. Stack in a pyramid, pour hot chocolate sauce over just before serving.',
  anec:'Profiteroles appear in French cookbooks as early as the 16th century under the name "petits choux." The hot chocolate sauce pouring over the ice cream creates a fascinating hot-cold contrast. This dessert has been inseparable from Parisian bistrots since the 1950s. The secret lies in the temperature contrast: the chocolate sauce must be scalding hot and the ice cream very cold at the moment of serving.'}},
{id:53,emoji:'👑',region:'paris',lat:48.84,lng:2.32,
 fr:{name:'Saint-Honoré',sub:'Paris, Île-de-France',
  ingr:[['Pâte feuilletée','200 g'],['Pâte à choux (eau 15cl, beurre 50g, farine 90g, œufs 3)',''],['Crème Chiboust (crème pâtissière + meringue italienne)','(lait 30cl, jaunes 3, sucre 80g, farine 25g, vanille + blancs 2, sucre 60g)'],['Caramel (sucre 200g)',''],['Crème Chantilly','20 cl'],['Sucre glace','']],
  prep:'Étaler la pâte feuilletée en cercle. Border d\'un cordon de pâte à choux à la poche. Piquer le centre, cuire 20 min à 180°C. Former des petits choux, cuire séparément. Préparer la crème Chiboust. Tremper les choux dans le caramel, les fixer sur le bord du gâteau. Garnir le centre de crème Chiboust, décorer de Chantilly à la douille Saint-Honoré.',
  anec:'Le Saint-Honoré fut créé vers 1847 par Chiboust, pâtissier rue Saint-Honoré à Paris, d\'où son nom. C\'est l\'une des pâtisseries françaises les plus techniques, combinant pâte feuilletée, pâte à choux, caramel et crème Chiboust (crème pâtissière allégée à la meringue italienne). Saint Honoré est le patron des boulangers et pâtissiers. La rue Saint-Honoré était au XIXe siècle la plus grande concentration de pâtisseries de Paris.'},
 en:{name:'Saint-Honoré',sub:'Paris, Île-de-France',
  ingr:[['Puff pastry','200 g'],['Choux pastry (water 15cl, butter 50g, flour 90g, eggs 3)',''],['Chiboust cream (pastry cream + Italian meringue)','(milk 30cl, 3 yolks, 80g sugar, 25g flour, vanilla + 2 whites, 60g sugar)'],['Caramel (200g sugar)',''],['Whipped cream (Chantilly)','20 cl'],['Powdered sugar','']],
  prep:'Roll puff pastry into a circle. Pipe a choux pastry border around the edge. Prick the centre, bake 20 min at 180°C. Pipe small choux puffs, bake separately. Make Chiboust cream. Dip puffs in caramel, fix around the pastry edge. Fill centre with Chiboust cream, decorate with Chantilly using a Saint-Honoré nozzle.',
  anec:'The Saint-Honoré was created around 1847 by Chiboust, a pastry chef on rue Saint-Honoré in Paris, hence its name. It is one of the most technically demanding French pastries, combining puff pastry, choux, caramel and Chiboust cream (pastry cream lightened with Italian meringue). Saint Honoré is the patron saint of bakers and pastry chefs. Rue Saint-Honoré in the 19th century had the greatest concentration of pastry shops in Paris.'}},
{id:54,emoji:'🥂',region:'paris',lat:48.87,lng:2.30,
 fr:{name:'Soufflé au Grand Marnier',sub:'Paris, Cuisine française classique',
  ingr:[['Grand Marnier','6 cl'],['Crème pâtissière (lait 25cl, jaunes 3, sucre 60g, farine 25g)',''],['Blancs d\'œufs','4'],['Sucre','40 g'],['Beurre + sucre (pour les moules)',''],['Zeste d\'orange','1'],['Sel','1 pincée']],
  prep:'Préparer la crème pâtissière avec zeste d\'orange. Hors du feu, ajouter le Grand Marnier. Beurrer et sucrer généreusement les moules à soufflé. Monter les blancs en neige ferme avec une pincée de sel, ajouter le sucre en pluie. Incorporer 1/3 des blancs à la crème pour la détendre, puis le reste délicatement. Remplir les moules aux 3/4. Cuire 12 min à 200°C SANS OUVRIR. Servir immédiatement saupoudré de sucre glace.',
  anec:'Le soufflé au Grand Marnier est la version festive et alcoolisée du soufflé classique. Le Grand Marnier, liqueur à base de cognac et d\'oranges amères créée en 1880 par Louis-Alexandre Marnier Lapostolle, est l\'alcool emblématique des soufflés sucrés français. Le restaurant La Tour d\'Argent à Paris en a fait son dessert signature. On sert parfois du Grand Marnier chaud supplémentaire à verser dans le soufflé à table, créant un effet spectaculaire.'},
 en:{name:'Grand Marnier Soufflé',sub:'Paris, Classic French cuisine',
  ingr:[['Grand Marnier','6 cl'],['Pastry cream (milk 25cl, 3 yolks, 60g sugar, 25g flour)',''],['Egg whites','4'],['Sugar','40 g'],['Butter + sugar (for moulds)',''],['Orange zest','1'],['Salt','1 pinch']],
  prep:'Make pastry cream with orange zest. Off heat, stir in Grand Marnier. Generously butter and sugar soufflé moulds. Whip whites to stiff peaks with a pinch of salt, add sugar in a stream. Fold 1/3 of whites into cream to loosen, then gently fold in the rest. Fill moulds 3/4 full. Bake 12 min at 200°C WITHOUT OPENING. Serve immediately dusted with powdered sugar.',
  anec:'The Grand Marnier soufflé is the festive, spirited version of the classic soufflé. Grand Marnier, a liqueur made from cognac and bitter oranges created in 1880 by Louis-Alexandre Marnier Lapostolle, is the emblematic spirit of French sweet soufflés. The restaurant La Tour d\'Argent in Paris made it their signature dessert. Extra warm Grand Marnier is sometimes served at the table to pour into the soufflé, creating a spectacular effect.'}},

{id:55,emoji:'👑',region:'paris',lat:48.85,lng:2.35,
 fr:{name:'Galette des Rois',sub:'Île-de-France, tradition nationale',
  ingr:[['Pâte feuilletée','2 rouleaux'],['Poudre d\'amandes','150 g'],['Beurre mou','150 g'],['Sucre','150 g'],['Œufs','3'],['Extrait d\'amande amère','1 c. à café'],['Rhum brun','2 c. à soupe'],['Fève en porcelaine','1'],['Jaune d\'œuf (dorure)','1']],
  prep:'Préparer la frangipane : crémer beurre et sucre, ajouter œufs un à un, incorporer poudre d\'amandes, rhum et extrait d\'amande. Étaler un disque de feuilletage sur plaque. Déposer la frangipane en laissant 2 cm de bord. Cacher la fève. Couvrir du second disque, souder les bords. Dorer au jaune d\'œuf, décorer de stries au couteau. Réfrigérer 30 min. Cuire 30 min à 180°C jusqu\'à dorure profonde.',
  anec:'La galette des Rois est dégustée le 6 janvier pour l\'Épiphanie, fête des Rois Mages. La tradition de cacher une fève dans un gâteau remonte aux Saturnales romaines. Celui qui trouve la fève devient le roi ou la reine et porte la couronne en papier. La version à la frangipane est typique du nord de la Loire. Au sud, on mange plutôt la brioche provençale aux fruits confits. La France consomme 30 millions de galettes chaque janvier.'},
 en:{name:'Galette des Rois',sub:'Île-de-France, national tradition',
  ingr:[['Puff pastry','2 rolls'],['Ground almonds','150 g'],['Soft butter','150 g'],['Sugar','150 g'],['Eggs','3'],['Almond extract','1 tsp'],['Dark rum','2 tbsp'],['Porcelain charm (fève)','1'],['Egg yolk (glaze)','1']],
  prep:'Make frangipane: cream butter and sugar, add eggs one by one, fold in ground almonds, rum and almond extract. Roll one pastry disc onto a tray. Spread frangipane leaving 2 cm border. Hide the charm. Cover with second disc, seal edges. Glaze with egg yolk, score a pattern with a knife. Refrigerate 30 min. Bake 30 min at 180°C until deep golden.',
  anec:'The Galette des Rois is eaten on January 6th for Epiphany, the feast of the Three Kings. The tradition of hiding a charm in a cake dates back to Roman Saturnalia. Whoever finds the charm becomes king or queen and wears the paper crown. The frangipane version is typical north of the Loire. In the south, people eat a Provençal brioche with candied fruits instead. France consumes 30 million galettes every January.'}},
{id:56,emoji:'🥧',region:'est',lat:47.25,lng:6.02,
 fr:{name:'Galette Franc-Comtoise',sub:'Franche-Comté',
  ingr:[['Farine','300 g'],['Beurre','150 g'],['Sucre','100 g'],['Œufs','2'],['Crème fraîche épaisse de Franche-Comté','20 cl'],['Sel','1 pincée'],['Levure chimique','1 sachet'],['Vanille','1 gousse'],['Jaune d\'œuf (dorure)','1']],
  prep:'Sabler farine, beurre, sucre et sel du bout des doigts. Ajouter les œufs et la vanille, pétrir légèrement. Incorporer la crème fraîche pour obtenir une pâte souple. Former une boule, réfrigérer 1h. Étaler en disque épais (2 cm). Dorer au jaune d\'œuf, strier à la fourchette. Cuire 30 min à 170°C. La galette doit être dorée et légèrement moelleuse à cœur.',
  anec:'La galette franc-comtoise est une pâtisserie régionale humble et généreuse, à base de la richissime crème fraîche de Franche-Comté. Elle se distingue de la galette des Rois par l\'absence de frangipane et sa texture à mi-chemin entre la tarte et le biscuit. Chaque boulangerie-pâtisserie de la région a sa recette secrète. Elle accompagne traditionnellement le vin jaune du Jura lors des repas de fête. La Comté, fromage emblématique de la région, et la crème fraîche sont les deux trésors laitiers franc-comtois.'},
 en:{name:'Franche-Comté Galette',sub:'Franche-Comté',
  ingr:[['Flour','300 g'],['Butter','150 g'],['Sugar','100 g'],['Eggs','2'],['Thick crème fraîche from Franche-Comté','20 cl'],['Salt','1 pinch'],['Baking powder','1 packet'],['Vanilla','1 pod'],['Egg yolk (glaze)','1']],
  prep:'Rub flour, butter, sugar and salt with fingertips. Add eggs and vanilla, knead lightly. Fold in crème fraîche for a supple dough. Shape into a ball, refrigerate 1h. Roll into a thick disc (2 cm). Glaze with egg yolk, score with a fork. Bake 30 min at 170°C. The galette should be golden and slightly soft inside.',
  anec:'The Franche-Comté galette is a humble, generous regional pastry made with the region\'s rich crème fraîche. It differs from the Galette des Rois by the absence of frangipane and its texture midway between a tart and a biscuit. Every bakery in the region has its secret recipe. It traditionally accompanies Jura vin jaune at festive meals. Comté cheese and crème fraîche are the two great dairy treasures of Franche-Comté.'}},
{id:57,emoji:'🥘',region:'est',lat:47.25,lng:6.36,
 fr:{name:'Petit Salé aux Lentilles',sub:'Franche-Comté, Auvergne',
  ingr:[['Palette de porc demi-sel','600 g'],['Saucisses de Morteau','2'],['Lentilles vertes du Puy','400 g'],['Carottes','3'],['Oignons','2'],['Ail','4 gousses'],['Clous de girofle','3'],['Bouquet garni','1'],['Moutarde de Dijon','2 c. à soupe'],['Lardons fumés','100 g'],['Vinaigre de vin','1 c. à soupe']],
  prep:'Dessaler la palette 2h dans l\'eau froide. Couvrir d\'eau froide avec oignons piqués de girofle, ail, bouquet garni. Porter à ébullition, écumer, cuire 45 min. Ajouter les lentilles rincées, les carottes, la saucisse de Morteau entière. Cuire 35 min à petit frémissement. Retirer les viandes, trancher. Assaisonner les lentilles de moutarde et vinaigre. Dresser viandes sur les lentilles.',
  anec:'Le petit salé aux lentilles est le plat hivernal par excellence du centre-est de la France. La saucisse de Morteau, fumée au bois de résineux dans le Doubs, apporte un fumet incomparable. Les lentilles vertes du Puy, première AOP agricole française (1996), sont réputées pour leur finesse et leur tenue à la cuisson. Ce mariage porc-lentilles remonte au Moyen Âge : les lentilles, symboles de richesse en Europe médiévale, accompagnaient les viandes conservées dans le sel pendant l\'hiver.'},
 en:{name:'Petit Salé with Lentils',sub:'Franche-Comté, Auvergne',
  ingr:[['Semi-salted pork shoulder','600 g'],['Morteau sausages','2'],['Green lentils from Le Puy','400 g'],['Carrots','3'],['Onions','2'],['Garlic','4 cloves'],['Cloves','3'],['Bouquet garni','1'],['Dijon mustard','2 tbsp'],['Smoked lardons','100 g'],['Wine vinegar','1 tbsp']],
  prep:'Desalt pork shoulder 2h in cold water. Cover with cold water, add onions studded with cloves, garlic, bouquet garni. Bring to boil, skim, cook 45 min. Add rinsed lentils, carrots, whole Morteau sausage. Simmer 35 min. Remove meats, slice. Season lentils with mustard and vinegar. Serve meats over lentils.',
  anec:'Petit salé with lentils is the quintessential winter dish of central-eastern France. Morteau sausage, smoked over resinous wood in the Doubs department, provides an incomparable smokiness. Le Puy green lentils, France\'s first agricultural AOP (1996), are prized for their finesse and ability to hold their shape when cooked. This pork-lentil pairing dates from the Middle Ages: lentils, symbols of wealth in medieval Europe, accompanied salted meats preserved for winter.'}},
{id:58,emoji:'🥩',region:'est',lat:47.39,lng:6.85,
 fr:{name:'Filet Mignon de Porc',sub:'Franche-Comté, Alsace',
  ingr:[['Filets mignons de porc','2 (env. 400g chacun)'],['Moutarde à l\'ancienne','3 c. à soupe'],['Crème fraîche épaisse','20 cl'],['Échalotes','4'],['Champignons de Paris','250 g'],['Vin blanc de Franche-Comté','15 cl'],['Beurre','40 g'],['Thym, laurier',''],['Sel, poivre',''],['Lardons fumés','100 g']],
  prep:'Enrober les filets de moutarde à l\'ancienne, sel, poivre. Les colorer sur toutes les faces dans le beurre chaud 5 min. Réserver. Dans la même poêle, faire revenir lardons, échalotes et champignons. Déglacer au vin blanc. Ajouter crème et thym. Remettre les filets, couvrir, cuire 15 min à feu doux. La viande doit rester rosée à cœur. Laisser reposer 5 min, trancher en médaillons.',
  anec:'Le filet mignon est le muscle psoas du porc, le plus tendre et le plus maigre. Sa finesse le distingue du filet de bœuf, avec lequel il partage le nom "mignon" (petit et délicat en vieux français). Ce morceau prisé illustre l\'excellence de la charcuterie franc-comtoise, région porcine par excellence. La moutarde à l\'ancienne avec ses graines entières apporte du caractère sans agressivité. En Franche-Comté, on l\'accompagne souvent de röstis ou de pommes sautées.'},
 en:{name:'Pork Tenderloin',sub:'Franche-Comté, Alsace',
  ingr:[['Pork tenderloins','2 (approx. 400g each)'],['Wholegrain mustard','3 tbsp'],['Thick crème fraîche','20 cl'],['Shallots','4'],['Button mushrooms','250 g'],['Franche-Comté white wine','15 cl'],['Butter','40 g'],['Thyme, bay leaf',''],['Salt, pepper',''],['Smoked lardons','100 g']],
  prep:'Coat tenderloins with wholegrain mustard, salt, pepper. Brown on all sides in hot butter 5 min. Set aside. In same pan, sauté lardons, shallots and mushrooms. Deglaze with white wine. Add cream and thyme. Return tenderloins, cover, cook 15 min on low. Meat should remain pink inside. Rest 5 min, slice into medallions.',
  anec:'The tenderloin is the pork psoas muscle, the most tender and lean cut. Its delicacy distinguishes it from beef fillet, with which it shares the name "mignon" (small and delicate in old French). This prized cut illustrates the excellence of Franche-Comté charcuterie, a premier pork-producing region. Wholegrain mustard with its whole seeds adds character without aggression. In Franche-Comté, it is often served with rösti or sautéed apples.'}},
,

{id:59,emoji:'🍺',region:'nord',lat:50.63,lng:3.06,
 fr:{name:'Carbonade Flamande',sub:'Flandre, Nord-Pas-de-Calais',
  ingr:[['Bœuf (paleron ou joue)','1.2 kg'],['Bière brune du Nord (Ch\'ti, Pelforth)','75 cl'],['Oignons','4'],['Lard fumé','150 g'],['Pain d\'épices','4 tranches'],['Moutarde forte','3 c. à soupe'],['Cassonade','2 c. à soupe'],['Bouquet garni','1'],['Beurre','50 g'],['Vinaigre de vin','1 c. à soupe'],['Sel, poivre','']],
  prep:'Couper le bœuf en gros cubes. Les dorer dans le beurre. Réserver. Faire fondre les oignons émincés et le lard 15 min. Remettre la viande, ajouter cassonade et vinaigre. Verser la bière. Porter à ébullition. Tartiner le pain d\'épices de moutarde, déposer sur la viande, côté moutarde en bas. Couvrir, cuire 2h30 à 160°C. Le pain d\'épices va fondre et épaissir la sauce. Servir avec des frites.',
  anec:'La carbonade (du flamand "karbonnade") est le plat emblématique de la Flandre française et belge. L\'utilisation de la bière comme liquide de braisage à la place du vin reflète la géographie : le Nord produit du houblon, pas des vignes. Le pain d\'épices tartiné de moutarde est le secret de l\'épaississement de la sauce, remplaçant le roux. Les estaminets (bistrots flamands) la servent avec des frites maison depuis des générations.'},
 en:{name:'Flemish Carbonade',sub:'Flanders, Nord-Pas-de-Calais',
  ingr:[['Beef (chuck or cheek)','1.2 kg'],['Dark northern beer','75 cl'],['Onions','4'],['Smoked bacon','150 g'],['Gingerbread','4 slices'],['Strong mustard','3 tbsp'],['Brown sugar','2 tbsp'],['Bouquet garni','1'],['Butter','50 g'],['Wine vinegar','1 tbsp'],['Salt, pepper','']],
  prep:'Cut beef into large chunks. Brown in butter. Set aside. Soften sliced onions and bacon 15 min. Return meat, add brown sugar and vinegar. Pour in beer. Bring to boil. Spread gingerbread with mustard, place on meat mustard-side down. Cover, cook 2h30 at 160°C. The gingerbread dissolves and thickens the sauce. Serve with fries.',
  anec:'Carbonade (from Flemish "karbonnade") is the emblematic dish of French and Belgian Flanders. Using beer as a braising liquid instead of wine reflects the geography: the North produces hops, not vines. Gingerbread spread with mustard is the secret to thickening the sauce, replacing a roux. Estaminets (Flemish bistros) have served it with homemade fries for generations.'}},
{id:60,emoji:'🧀',region:'nord',lat:50.72,lng:2.53,
 fr:{name:'Welsh',sub:'Boulogne-sur-Mer, Côte d\'Opale',
  ingr:[['Cheddar ou Chester râpé','400 g'],['Bière blonde','20 cl'],['Moutarde forte','2 c. à soupe'],['Sauce Worcestershire','2 c. à café'],['Tabasco','quelques gouttes'],['Pain de mie épais','4 tranches'],['Jambon blanc','4 tranches'],['Œufs','4 (facultatif, œuf poché)'],['Beurre','20 g'],['Poivre noir','']],
  prep:'Faire fondre le fromage râpé dans la bière chaude à feu doux en remuant. Ajouter moutarde, Worcestershire, Tabasco, poivre. Bien mélanger pour obtenir une sauce lisse et nappe. Toaster les tranches de pain. Disposer le jambon sur le pain. Napper généreusement de sauce au fromage. Gratiner 5 min sous le gril jusqu\'à bullage et dorure. Poser un œuf poché dessus si désiré.',
  anec:'Le welsh est une adaptation du "Welsh Rarebit" britannique, arrivé sur la Côte d\'Opale avec les marins anglais au XIXe siècle. Boulogne-sur-Mer, principal port de pêche français, entretenait des liens étroits avec l\'Angleterre. Le welsh est devenu un plat emblématique du Nord, servi dans tous les estaminets. La version ch\'timi remplace parfois le cheddar par du Maroilles, fromage AOC du Nord, pour plus de caractère.'},
 en:{name:'Welsh',sub:'Boulogne-sur-Mer, Opal Coast',
  ingr:[['Grated Cheddar or Chester','400 g'],['Lager beer','20 cl'],['Strong mustard','2 tbsp'],['Worcestershire sauce','2 tsp'],['Tabasco','a few drops'],['Thick white bread','4 slices'],['Cooked ham','4 slices'],['Eggs','4 (optional, poached)'],['Butter','20 g'],['Black pepper','']],
  prep:'Melt grated cheese in warm beer over low heat, stirring. Add mustard, Worcestershire, Tabasco, pepper. Stir to a smooth, coating sauce. Toast bread slices. Lay ham on toast. Generously coat with cheese sauce. Grill 5 min until bubbling and golden. Top with a poached egg if desired.',
  anec:'Welsh is an adaptation of British "Welsh Rarebit," brought to the Opal Coast by English sailors in the 19th century. Boulogne-sur-Mer, France\'s main fishing port, had close ties with England. Welsh became an emblematic northern dish, served in all estaminets. The ch\'timi version sometimes replaces cheddar with Maroilles, the AOC cheese from the North, for more character.'}},
{id:61,emoji:'🫙',region:'nord',lat:50.85,lng:2.23,
 fr:{name:'Potjevleesch',sub:'Dunkerque, Flandre Maritime',
  ingr:[['Poulet (morceaux)','400 g'],['Lapin (morceaux)','400 g'],['Veau (épaule)','300 g'],['Porc (palette)','300 g'],['Vin blanc sec','30 cl'],['Vinaigre de vin blanc','10 cl'],['Oignon','2'],['Ail','4 gousses'],['Thym, laurier, persil',''],['Grains de poivre, genièvre',''],['Gélatine (si nécessaire)','4 feuilles'],['Sel','']],
  prep:'Désosser et couper les viandes en morceaux réguliers. Les faire mariner 12h dans vin blanc, vinaigre, oignons, ail et aromates. Égoutter. Dans une terrine, alterner couches de viandes. Couvrir avec la marinade filtrée. Cuire à couvert 2h à 150°C. Laisser refroidir, réfrigérer 24h minimum : la gelée doit se former naturellement. Servir froid en tranches avec frites et salade.',
  anec:'Potjevleesch signifie "petit pot de viandes" en flamand. C\'est la terrine froide typique de la Flandre maritime, consommée depuis le Moyen Âge comme moyen de conservation des viandes. La gelée naturelle (collagène des os) qui enrobe les viandes est sa signature. À Dunkerque, il est servi pendant le célèbre Carnaval de Dunkerque, l\'un des plus grands de France (80 000 participants). Les bals du Carnaval se terminent traditionnellement par un potjevleesch.'},
 en:{name:'Potjevleesch',sub:'Dunkirk, Maritime Flanders',
  ingr:[['Chicken (pieces)','400 g'],['Rabbit (pieces)','400 g'],['Veal (shoulder)','300 g'],['Pork (shoulder)','300 g'],['Dry white wine','30 cl'],['White wine vinegar','10 cl'],['Onions','2'],['Garlic','4 cloves'],['Thyme, bay leaf, parsley',''],['Peppercorns, juniper berries',''],['Gelatine (if needed)','4 sheets'],['Salt','']],
  prep:'Debone and cut meats into even pieces. Marinate 12h in white wine, vinegar, onions, garlic and aromatics. Drain. In a terrine, alternate layers of meats. Cover with strained marinade. Cook covered 2h at 150°C. Cool, refrigerate 24h minimum: the jelly must form naturally. Serve cold in slices with fries and salad.',
  anec:'Potjevleesch means "small pot of meats" in Flemish. It is the typical cold terrine of Maritime Flanders, consumed since the Middle Ages as a meat preservation method. The natural jelly (bone collagen) encasing the meats is its signature. In Dunkirk, it is served during the famous Dunkirk Carnival, one of France\'s largest (80,000 participants). The Carnival balls traditionally end with a potjevleesch.'}},
{id:62,emoji:'🥧',region:'nord',lat:50.41,lng:2.83,
 fr:{name:'Flamiche aux Poireaux',sub:'Douai, Picardie',
  ingr:[['Poireaux','1 kg'],['Beurre','80 g'],['Crème fraîche épaisse','25 cl'],['Œufs','3'],['Pâte brisée','1 fond'],['Gruyère râpé','80 g'],['Noix de muscade',''],['Sel, poivre',''],['Lardons fumés (facultatif)','100 g']],
  prep:'Nettoyer et émincer finement les poireaux. Les faire fondre à couvert dans le beurre 20 min à feu doux jusqu\'à compoter. Laisser refroidir. Battre œufs et crème. Mélanger avec les poireaux, gruyère, muscade, sel, poivre. Foncer le moule de pâte brisée, piquer. Verser l\'appareil. Cuire 35 min à 180°C jusqu\'à prise et légère coloration.',
  anec:'La flamiche (du picard "flamique", galette) est l\'emblème de la cuisine picarde et du Nord. La version aux poireaux de Douai est la plus connue. C\'est une sorte de quiche sans les lardons ni le jambon, où le poireau, légume roi du Nord, est seul vedette. La flamiche est mentionnée dans des textes du XIVe siècle sous le nom de "flammiche". Elle se décline aussi au Maroilles (fromage fort) dans le Hainaut.'},
 en:{name:'Leek Flamiche',sub:'Douai, Picardy',
  ingr:[['Leeks','1 kg'],['Butter','80 g'],['Thick crème fraîche','25 cl'],['Eggs','3'],['Shortcrust pastry','1 shell'],['Grated Gruyère','80 g'],['Nutmeg',''],['Salt, pepper',''],['Smoked lardons (optional)','100 g']],
  prep:'Clean and finely slice leeks. Sweat covered in butter 20 min on low heat until very soft. Cool. Beat eggs and cream. Mix with leeks, Gruyère, nutmeg, salt, pepper. Line pan with pastry, prick base. Pour in filling. Bake 35 min at 180°C until set and lightly golden.',
  anec:'Flamiche (from Picard "flamique", flatbread) is the emblem of Picard and northern cuisine. The leek version from Douai is best known. It is a quiche-like tart where leek, the king vegetable of the North, is the sole star. Flamiche is mentioned in 14th century texts as "flammiche". It also comes in a Maroilles cheese version in Hainaut.'}},
{id:63,emoji:'🥞',region:'nord',lat:49.89,lng:2.30,
 fr:{name:'Ficelle Picarde',sub:'Amiens, Picardie',
  ingr:[['Crêpes de froment','8 grandes'],['Jambon blanc','8 tranches'],['Champignons de Paris','300 g'],['Crème fraîche épaisse','30 cl'],['Échalotes','3'],['Beurre','40 g'],['Gruyère râpé','100 g'],['Sel, poivre, muscade',''],['Persil haché','']],
  prep:'Émincer et faire suer champignons et échalotes dans le beurre. Assaisonner. Ajouter 10 cl de crème. Sur chaque crêpe, déposer une tranche de jambon, 2 c. à soupe de duxelles. Rouler en cigare. Disposer dans un plat beurré. Napper du reste de crème, parsemer de gruyère. Gratiner 20 min à 200°C jusqu\'à coloration dorée.',
  anec:'La ficelle picarde est une crêpe garnie et gratinée, spécialité d\'Amiens créée dans les années 1950 par le chef Marcel Lefèvre. Son nom évoque la finesse d\'une ficelle de pain. Elle est inscrite au patrimoine gastronomique picard. La Picardie est une grande région de production de blé et de betterave sucrière, ce qui explique la tradition des crêpes de froment. La ficelle picarde est aujourd\'hui servie dans tous les restaurants régionaux comme entrée chaude.'},
 en:{name:'Ficelle Picarde',sub:'Amiens, Picardy',
  ingr:[['Wheat crêpes','8 large'],['Cooked ham','8 slices'],['Button mushrooms','300 g'],['Thick crème fraîche','30 cl'],['Shallots','3'],['Butter','40 g'],['Grated Gruyère','100 g'],['Salt, pepper, nutmeg',''],['Chopped parsley','']],
  prep:'Slice and sweat mushrooms and shallots in butter. Season. Add 10 cl cream. On each crêpe, place a slice of ham and 2 tbsp mushroom filling. Roll into a cylinder. Arrange in a buttered dish. Pour remaining cream over, sprinkle with Gruyère. Gratin 20 min at 200°C until golden.',
  anec:'Ficelle picarde is a filled and gratinéed crêpe, a speciality of Amiens created in the 1950s by chef Marcel Lefèvre. Its name evokes the thinness of a bread ficelle. It is registered as part of Picard gastronomic heritage. Picardy is a major wheat and sugar beet region, explaining the tradition of wheat crêpes. Ficelle picarde is now served in all regional restaurants as a warm starter.'}},
{id:64,emoji:'🐔',region:'nord',lat:51.03,lng:2.37,
 fr:{name:'Waterzoï de Poulet',sub:'Flandre, Dunkerque',
  ingr:[['Poulet fermier découpé','1.5 kg'],['Carottes','3'],['Poireaux','3'],['Céleri','3 branches'],['Pommes de terre','400 g'],['Oignon','1'],['Crème fraîche','20 cl'],['Jaunes d\'œufs','3'],['Bouillon de volaille','1 l'],['Beurre','40 g'],['Persil plat','1 bouquet'],['Sel, poivre blanc','']],
  prep:'Faire revenir les morceaux de poulet dans le beurre. Ajouter oignon et légumes en julienne (carottes, poireaux, céleri). Couvrir de bouillon, ajouter pommes de terre en dés. Cuire 35 min à frémissement. Retirer le poulet. Lier le bouillon avec jaunes d\'œufs et crème hors du feu (ne pas faire bouillir). Remettre le poulet, parsemer de persil. Servir en cocotte.',
  anec:'Le waterzoï (du flamand "waterzooï", eau qui bout) est originaire de Gand en Belgique, mais la Flandre française le revendique comme sien. La version au poisson (cabillaud, saumon) est la plus ancienne. La version au poulet s\'est popularisée au XXe siècle quand le poisson se raréfia dans les rivières. C\'est un pot-au-feu flamand, délicat et crémeux, à mi-chemin entre la soupe et le ragoût. Julia Child l\'a découvert lors de ses séjours en Europe.'},
 en:{name:'Chicken Waterzoï',sub:'Flanders, Dunkirk',
  ingr:[['Free-range chicken, cut up','1.5 kg'],['Carrots','3'],['Leeks','3'],['Celery','3 stalks'],['Potatoes','400 g'],['Onion','1'],['Crème fraîche','20 cl'],['Egg yolks','3'],['Chicken stock','1 l'],['Butter','40 g'],['Flat parsley','1 bunch'],['Salt, white pepper','']],
  prep:'Brown chicken pieces in butter. Add onion and julienned vegetables (carrots, leeks, celery). Cover with stock, add diced potatoes. Simmer 35 min. Remove chicken. Thicken broth off heat with egg yolks and cream (do not boil). Return chicken, scatter parsley. Serve in a casserole.',
  anec:'Waterzoï (from Flemish "waterzooï", boiling water) originates from Ghent in Belgium, but French Flanders claims it as its own. The fish version (cod, salmon) is the oldest. The chicken version became popular in the 20th century when fish became scarce in rivers. It is a Flemish pot-au-feu, delicate and creamy, halfway between a soup and a stew. Julia Child discovered it during her stays in Europe.'}},
{id:65,emoji:'🧀',region:'nord',lat:50.27,lng:3.97,
 fr:{name:'Tarte au Maroilles',sub:'Avesnois, Nord',
  ingr:[['Maroilles (1/4 soit env. 200g)','1 quart'],['Pâte à pain ou briochée','300 g'],['Crème fraîche épaisse','20 cl'],['Œufs','2'],['Lardons fumés','100 g'],['Poivre noir concassé',''],['Noix de muscade',''],['Beurre',''],['Ciboulette (facultatif)','']],
  prep:'Étaler la pâte dans le moule beurré, laisser lever 30 min. Faire revenir les lardons. Battre œufs et crème, poivrer, ajouter muscade. Gratter la croûte orangée du Maroilles, le couper en lamelles. Répartir lardons sur la pâte, verser l\'appareil crème-œufs, disposer les lamelles de Maroilles. Cuire 30 min à 200°C. Servir chaud, tiède ou froid.',
  anec:'Le Maroilles est un fromage à pâte molle et croûte lavée fabriqué depuis le Xe siècle dans l\'abbaye de Maroilles (Nord). Son odeur puissante contraste avec sa saveur en bouche, plus douce. AOC depuis 1976. La tarte au Maroilles ("tarte au Maroille" sans s en local) est le plat festif par excellence du Hainaut et de l\'Avesnois. Charles de Gaulle, natif de Lille, en était paraît-il friand. Elle se décline en version sucrée-salée avec un fond de cassonade.'},
 en:{name:'Maroilles Tart',sub:'Avesnois, Nord',
  ingr:[['Maroilles cheese (1/4, approx. 200g)','1 quarter'],['Bread or brioche dough','300 g'],['Thick crème fraîche','20 cl'],['Eggs','2'],['Smoked lardons','100 g'],['Cracked black pepper',''],['Nutmeg',''],['Butter',''],['Chives (optional)','']],
  prep:'Roll dough into buttered pan, prove 30 min. Sauté lardons. Beat eggs and cream, season with pepper and nutmeg. Scrape the orange rind off Maroilles, slice thinly. Spread lardons on dough, pour cream mixture, arrange Maroilles slices. Bake 30 min at 200°C. Serve hot, warm or cold.',
  anec:'Maroilles is a soft, washed-rind cheese made since the 10th century at Maroilles Abbey in northern France. Its powerful aroma contrasts with its milder flavour on the palate. AOC since 1976. The Maroilles tart is the festive dish par excellence of Hainaut and Avesnois. Charles de Gaulle, a native of Lille, was reportedly fond of it. It also comes in a sweet-savoury version with a brown sugar base.'}}
,

{id:66,emoji:'🥬',region:'nord',lat:50.63,lng:3.06,
 fr:{name:'Endives au Jambon',sub:'Nord, Flandre',
  ingr:[['Endives (chicons)','8'],['Jambon blanc','8 tranches'],['Beurre','40 g'],['Lait','50 cl'],['Farine','40 g'],['Gruyère râpé','120 g'],['Noix de muscade',''],['Sucre','1 pincée'],['Jus de citron','1 c. à soupe'],['Sel, poivre blanc','']],
  prep:'Cuire les endives à l\'eau bouillante salée avec sucre et citron 20 min. Égoutter, presser pour enlever l\'amertume et l\'eau. Enrouler chaque endive dans une tranche de jambon. Disposer dans un plat beurré. Préparer une béchamel : faire fondre le beurre, ajouter farine, verser le lait chaud progressivement, assaisonner de muscade. Incorporer la moitié du gruyère. Napper les endives de béchamel, parsemer du reste de gruyère. Gratiner 25 min à 200°C.',
  anec:'L\'endive (ou chicon en ch\'ti et en belge) est la reine des légumes du Nord. Elle fut découverte par hasard en 1830 par le jardinier belge Franz Bresiers, qui oublia des racines de chicorée dans une cave : elles produisirent des pousses blanches et tendres. Le Nord de la France produit 70% des endives françaises. Les endives au jambon gratiné à la béchamel sont le plat du dimanche par excellence dans les familles nordistes, souvent appelé "chicons au jambon" dans les estaminets.'},

let curFilter='all', map=null, markersLayer=null;

function t(key){return LANG[curLang][key]||key}

function toggleLang(){
  curLang=curLang==='fr'?'en':'fr';
  document.querySelector('.lang-btn').textContent=curLang==='fr'?'🇬🇧':'🇫🇷';
  applyLang();
  if(curRecipe)renderDetail(curRecipe);
  if(curTab==='quiz')renderQuiz();
}

function applyLang(){
  document.getElementById('h-title').textContent=t('h-title');
  document.getElementById('h-sub').textContent=t('h-sub');

  document.getElementById('tab-map').textContent=t('tab-map');
  document.getElementById('tab-list').textContent=t('tab-list');
  document.getElementById('tab-favs').textContent=t('tab-favs');
  document.getElementById('tab-shopping').textContent=t('tab-shopping');
  document.getElementById('tab-quiz').textContent=t('tab-quiz');
  document.getElementById('tab-settings').textContent=t('tab-settings');

  renderFilters();
  renderList();
  renderFavs();

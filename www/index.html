<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Recettes de France</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=IM+Fell+English:ital@0;1&display=swap');
:root{
  --bg:#07090f;--card:#0f1218;--gold:#c9a84c;--gold2:#e8c96a;--amber:#b8860b;
  --text:#e8dcc8;--muted:#a08050;--muted2:#c8a870;--border:#2a2010;
  --red:#c0392b;--green:#27ae60;--fs:1;
}
@media(min-width:768px){:root{--fs:1.3}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
#app{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:var(--bg);overflow:hidden}
.header{padding-top:calc(14px + env(safe-area-inset-top));padding-bottom:10px;background:var(--bg);flex-shrink:0;border-bottom:1px solid var(--border);text-align:center;position:relative}
.header h1{font-family:'IM Fell English',serif;font-size:calc(20px * var(--fs));color:var(--gold);letter-spacing:1px}
.header p{font-family:'Cormorant Garamond',serif;font-size:calc(11px * var(--fs));color:var(--muted2);margin-top:2px}
.lang-btn{position:absolute;right:12px;top:calc(14px + env(safe-area-inset-top));background:none;border:1px solid var(--border);border-radius:6px;padding:3px 7px;font-size:16px;cursor:pointer;color:var(--text)}
.tabs{display:flex;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 4px;font-family:'Cormorant Garamond',serif;font-size:calc(12px * var(--fs));color:var(--muted);text-align:center;cursor:pointer;border:none;background:none;transition:.2s}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold)}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(12px + env(safe-area-inset-bottom))}
/* MAP */
#map{height:100%;width:100%}
#map-wrap{height:100%;position:relative}
.map-info{position:absolute;bottom:calc(16px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:rgba(7,9,15,.85);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-family:'Cormorant Garamond',serif;font-size:calc(13px * var(--fs));color:var(--muted2);z-index:1000;pointer-events:none;white-space:nowrap}
/* LISTE */
.search-wrap{padding:12px;position:relative}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 36px 9px 14px;font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));color:var(--text);outline:none}
.search-input::placeholder{color:var(--muted)}
.clear-btn{position:absolute;right:20px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;background:var(--muted);border:none;color:#000;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.filters{display:flex;gap:6px;padding:0 12px 10px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted2);font-family:'Cormorant Garamond',serif;font-size:calc(12px * var(--fs));cursor:pointer;white-space:nowrap}
.filter-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}
.recipe-list{padding:0 12px}
.recipe-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px}
.recipe-card:active{opacity:.7}
.recipe-emoji{font-size:32px;flex-shrink:0}
.recipe-info{flex:1;min-width:0}
.recipe-name{font-family:'IM Fell English',serif;font-size:calc(16px * var(--fs));color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-meta{font-family:'Cormorant Garamond',serif;font-size:calc(13px * var(--fs));color:var(--muted2);margin-top:2px}
.recipe-region-tag{font-size:calc(11px * var(--fs));color:var(--muted);margin-top:3px}
.fav-heart{font-size:20px;flex-shrink:0;cursor:pointer}
/* DETAIL */
#detail-panel{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:2000;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(24px + env(safe-area-inset-bottom));display:none}
.detail-header{padding:calc(14px + env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.back-btn{background:none;border:none;color:var(--gold);font-size:22px;cursor:pointer;flex-shrink:0;padding-top:2px}
.detail-title-wrap{flex:1}
.detail-emoji{font-size:40px;text-align:center;padding:16px 0 8px}
.detail-name{font-family:'IM Fell English',serif;font-size:calc(22px * var(--fs));color:var(--gold)}
.detail-sub{font-family:'Cormorant Garamond',serif;font-size:calc(14px * var(--fs));color:var(--muted2);margin-top:2px}
.detail-fav{background:none;border:1px solid var(--border);border-radius:50%;font-size:22px;cursor:pointer;flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.detail-body{padding:0 16px}
.section-title{font-family:'IM Fell English',serif;font-size:calc(15px * var(--fs));color:var(--gold2);margin:16px 0 8px;border-bottom:1px solid var(--border);padding-bottom:4px}
.portions-ctrl{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.portions-btn{width:32px;height:32px;border-radius:50%;background:var(--border);border:none;color:var(--gold);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.portions-val{font-family:'Cormorant Garamond',serif;font-size:calc(16px * var(--fs));color:var(--text);min-width:80px;text-align:center}
.ingr-list{list-style:none}
.ingr-list li{font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));color:var(--text);padding:5px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.ingr-list li span{color:var(--muted2)}
.prep-text{font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));color:var(--text);line-height:1.7;white-space:pre-line}
.anecdote-box{background:var(--card);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:12px 14px;margin-top:8px}
.anecdote-box p{font-family:'Cormorant Garamond',serif;font-size:calc(14px * var(--fs));color:var(--muted2);font-style:italic;line-height:1.6}
/* FAVORIS */
.empty-state{text-align:center;padding:60px 20px;font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));color:var(--muted)}
.empty-state .big{font-size:48px;display:block;margin-bottom:12px}
/* QUIZ */
.quiz-wrap{padding:16px}
.quiz-score{font-family:'Cormorant Garamond',serif;font-size:calc(14px * var(--fs));color:var(--muted2);text-align:right;margin-bottom:12px}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;text-align:center}
.quiz-emoji{font-size:52px;margin-bottom:12px}
.quiz-question{font-family:'IM Fell English',serif;font-size:calc(18px * var(--fs));color:var(--text);margin-bottom:6px}
.quiz-hint{font-family:'Cormorant Garamond',serif;font-size:calc(13px * var(--fs));color:var(--muted);margin-bottom:20px;font-style:italic}
.quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quiz-opt{padding:10px 8px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;font-size:calc(14px * var(--fs));cursor:pointer;transition:.2s}
.quiz-opt.correct{background:#1a3a1a;border-color:var(--green);color:#6fcf97}
.quiz-opt.wrong{background:#3a1a1a;border-color:var(--red);color:#eb5757}
.quiz-next{margin-top:14px;padding:10px 24px;background:var(--gold);border:none;border-radius:10px;color:#000;font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));cursor:pointer;display:none}
.quiz-result{text-align:center;padding:30px 20px}
.quiz-result .score-big{font-family:'IM Fell English',serif;font-size:calc(48px * var(--fs));color:var(--gold)}
.quiz-restart{margin-top:16px;padding:10px 24px;background:var(--gold);border:none;border-radius:10px;color:#000;font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));cursor:pointer}
/* SETTINGS */
.settings-panel{padding:16px}
.settings-section{margin-bottom:20px}
.settings-section h3{font-family:'IM Fell English',serif;font-size:calc(14px * var(--fs));color:var(--gold2);margin-bottom:10px}

.apps-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.app-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.app-item img{width:56px;height:56px;border-radius:13px;background:var(--border)}
.app-item span{font-family:'Cormorant Garamond',serif;font-size:9px;color:var(--muted);text-align:center;line-height:1.2}

/* PHOTOS */
.recipe-thumb{width:60px;height:60px;object-fit:cover;border-radius:10px;flex-shrink:0;background:var(--border)}
.recipe-thumb-placeholder{width:60px;height:60px;border-radius:10px;flex-shrink:0;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:28px}
.detail-photo{width:100%;height:220px;object-fit:cover;display:block;background:var(--border)}
.detail-photo-placeholder{width:100%;height:220px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:64px}

/* SHOPPING LIST */
.shopping-header{display:flex;align-items:center;justify-content:space-between;padding:14px 12px 6px;gap:10px}
.shopping-sub{font-family:'Cormorant Garamond',serif;font-size:calc(13px * var(--fs));color:var(--muted2);flex:1}
.shopping-share-btn{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:7px 14px;font-family:'Cormorant Garamond',serif;font-size:calc(13px * var(--fs));color:var(--gold);cursor:pointer;white-space:nowrap}
.shopping-recipe-group{margin-bottom:4px}
.shopping-recipe-title{font-family:'IM Fell English',serif;font-size:calc(14px * var(--fs));color:var(--gold2);padding:10px 12px 4px;display:flex;align-items:center;gap:8px}
.shopping-item{display:flex;align-items:center;gap:12px;padding:9px 12px;border-bottom:1px solid var(--border)}
.shopping-checkbox{width:22px;height:22px;border-radius:50%;border:2px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:transparent;transition:.15s}
.shopping-checkbox.checked{background:var(--gold);border-color:var(--gold);color:#000}
.shopping-item-text{flex:1;font-family:'Cormorant Garamond',serif;font-size:calc(15px * var(--fs));color:var(--text)}
.shopping-item.checked .shopping-item-text{color:var(--muted);text-decoration:line-through}
.shopping-item-qty{font-family:'Cormorant Garamond',serif;font-size:calc(13px * var(--fs));color:var(--muted2);flex-shrink:0}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1 id="h-title">🍽 Recettes de France</h1>
    <p id="h-sub">66 recettes emblématiques</p>
    <button class="lang-btn" onclick="toggleLang()">🇬🇧</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('list')" id="tab-list">📋 Recettes</button>
    <button class="tab" onclick="showTab('map')" id="tab-map">🗺 Carte</button>
    <button class="tab" onclick="showTab('favs')" id="tab-favs">❤️ Favoris</button>
    <button class="tab" onclick="showTab('shopping')" id="tab-shopping">🛒 Courses</button>
    <button class="tab" onclick="showTab('quiz')" id="tab-quiz">🎯 Quiz</button>
    <button class="tab" onclick="showTab('settings')" id="tab-settings">📱</button>
  </div>
  <div class="main" id="main-area">
    <!-- MAP TAB -->
    <div id="tab-map-content" style="height:100%;display:none">
      <div id="map-wrap" style="height:100%">
        <div id="map"></div>
        <div class="map-info" id="map-info">Touchez un marqueur pour voir la recette</div>
      </div>
    </div>
    <!-- LIST TAB -->
    <div id="tab-list-content">
      <div class="search-wrap">
        <input class="search-input" id="search-input" placeholder="Rechercher une recette..." oninput="filterList()" />
        <button class="clear-btn" id="clear-btn" onclick="clearSearch()">✕</button>
      </div>
      <div class="filters" id="filter-bar"></div>
      <div class="recipe-list" id="recipe-list"></div>
    </div>
    <!-- FAVS TAB -->
    <div id="tab-favs-content" style="display:none">
      <div class="recipe-list" id="favs-list" style="padding-top:12px"></div>
    </div>
    <!-- SHOPPING TAB -->
    <div id="tab-shopping-content" style="display:none">
      <div class="shopping-header">
        <div class="shopping-sub" id="shopping-sub"></div>
        <button class="shopping-share-btn" id="shopping-share-btn" onclick="shareAsText()">📤 <span id="shopping-share-label">Partager</span></button>
      </div>
      <div class="recipe-list" id="shopping-list" style="padding-top:8px"></div>
    </div>
    <!-- QUIZ TAB -->
    <div id="tab-quiz-content" style="display:none">
      <div class="quiz-wrap" id="quiz-wrap"></div>
    </div>
    <!-- SETTINGS TAB -->
    <div id="tab-settings-content" style="display:none">
      <div class="settings-panel">

        <div class="settings-section">
          <h3 id="s-apps">Nos applications</h3>
          <div class="apps-grid" id="apps-grid"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- DETAIL PANEL -->
  <div id="detail-panel">
    <div class="detail-header">
      <button class="back-btn" onclick="closeDetail()">‹</button>
      <div class="detail-title-wrap">
        <div class="detail-name" id="d-name"></div>
        <div class="detail-sub" id="d-sub"></div>
      </div>
      <button class="detail-fav" id="d-fav" onclick="toggleFavDetail()">🤍</button>
    </div>
    <div class="detail-body">
      <div id="d-photo-wrap"></div>
      <div class="detail-emoji" id="d-emoji" style="display:none"></div>
      <div class="section-title" id="d-ingr-title">Ingrédients</div>
      <div class="portions-ctrl">
        <button class="portions-btn" onclick="adjPortions(-1)">−</button>
        <div class="portions-val" id="portions-val">4 personnes</div>
        <button class="portions-btn" onclick="adjPortions(1)">+</button>
      </div>
      <ul class="ingr-list" id="d-ingr-list"></ul>
      <div class="section-title" id="d-prep-title">Préparation</div>
      <div class="prep-text" id="d-prep"></div>
      <div class="section-title" id="d-anec-title">Anecdote historique</div>
      <div class="anecdote-box"><p id="d-anec"></p></div>
    </div>
  </div>
</div>

{id:1,emoji:'🐟',region:'sud-est',lat:43.3,lng:5.37,
 fr:{name:'Bouillabaisse',sub:'Marseille, Provence',
  ingr:[['Poissons variés (rascasse, saint-pierre, grondin)','1.5 kg'],['Pommes de terre','400 g'],['Tomates','400 g'],['Oignon','1'],['Ail','4 gousses'],['Safran','1 pincée'],['Huile d\'olive','6 c. à soupe'],['Bouquet garni','1'],['Fenouil','1 branche'],['Pain grillé (croûtons)','8 tranches'],['Rouille (ail, safran, jaune d\'œuf, huile)','100 g']],
  prep:'Faites revenir oignon et ail dans l\'huile. Ajoutez tomates, pommes de terre, bouquet garni, fenouil et safran. Recouvrez d\'eau bouillante. Ajoutez les poissons fermes en premier, puis les fragiles. Cuisson 15 min à feu vif. Servez bouillon et poisson séparément, avec croûtons et rouille.',
  anec:'La bouillabaisse vient du provençal "bouir-abaissar" (bouillir puis baisser le feu). À l\'origine, c\'était le repas des pêcheurs marseillais qui cuisinaient les invendus du marché. La charte de la Bouillabaisse de Marseille (1980) impose 4 espèces minimum dont la rascasse.'},
 en:{name:'Bouillabaisse',sub:'Marseille, Provence',
  ingr:[['Assorted fish (scorpionfish, John Dory, gurnard)','1.5 kg'],['Potatoes','400 g'],['Tomatoes','400 g'],['Onion','1'],['Garlic','4 cloves'],['Saffron','1 pinch'],['Olive oil','6 tbsp'],['Bouquet garni','1'],['Fennel','1 sprig'],['Toasted bread (croutons)','8 slices'],['Rouille (garlic, saffron, egg yolk, oil)','100 g']],
  prep:'Sauté onion and garlic in oil. Add tomatoes, potatoes, bouquet garni, fennel and saffron. Cover with boiling water. Add firm fish first, then delicate ones. Cook 15 min over high heat. Serve broth and fish separately, with croutons and rouille.',
  anec:'Bouillabaisse comes from the Provençal "bouir-abaissar" (boil then lower heat). Originally it was Marseille fishermen\'s meal, made from unsold market fish. The 1980 Marseille Bouillabaisse Charter requires at least 4 species including scorpionfish.'}},
{id:2,emoji:'🫘',region:'sud-ouest',lat:43.21,lng:2.35,
 fr:{name:'Cassoulet',sub:'Castelnaudary, Languedoc',
  ingr:[['Haricots blancs secs (lingots)','500 g'],['Confit de canard','2 cuisses'],['Saucisse de Toulouse','300 g'],['Lard fumé','150 g'],['Épaule d\'agneau','300 g'],['Tomates concassées','200 g'],['Oignon','1'],['Ail','6 gousses'],['Bouquet garni','1'],['Chapelure','3 c. à soupe']],
  prep:'Trempage des haricots 12h. Cuire 1h à l\'eau avec bouquet garni. Dans une cassole, alternez couches de haricots et viandes (lard, saucisse dorée, agneau, confit). Recouvrir du bouillon de cuisson. Parsemer de chapelure. Cuire 2h30 à 160°C. Casser la croûte 3 fois en cours de cuisson.',
  anec:'La légende raconte que lors du siège de Castelnaudary (1355), les habitants affamés réunirent tous leurs vivres pour nourrir les défenseurs. Ce plat aurait redonné tant de vigueur aux soldats qu\'ils repoussèrent les Anglais. La ville se dispute la paternité avec Carcassonne et Toulouse.'},
 en:{name:'Cassoulet',sub:'Castelnaudary, Languedoc',
  ingr:[['Dried white beans (lingot)','500 g'],['Duck confit','2 legs'],['Toulouse sausage','300 g'],['Smoked bacon','150 g'],['Lamb shoulder','300 g'],['Crushed tomatoes','200 g'],['Onion','1'],['Garlic','6 cloves'],['Bouquet garni','1'],['Breadcrumbs','3 tbsp']],
  prep:'Soak beans 12h. Cook 1h in water with bouquet garni. In a cassole dish, alternate layers of beans and meats (bacon, browned sausage, lamb, confit). Cover with cooking broth. Sprinkle breadcrumbs. Bake 2h30 at 160°C. Break the crust 3 times during cooking.',
  anec:'Legend says during the 1355 siege of Castelnaudary, starving inhabitants pooled all their food to feed the defenders. The dish supposedly revived the soldiers who then repelled the English. The town disputes its origin with Carcassonne and Toulouse.'}},
{id:3,emoji:'🥩',region:'est',lat:47.32,lng:5.04,
 fr:{name:'Bœuf Bourguignon',sub:'Bourgogne',
  ingr:[['Bœuf (paleron ou joue)','1.2 kg'],['Vin rouge de Bourgogne','75 cl'],['Lardons fumés','150 g'],['Champignons de Paris','250 g'],['Carottes','3'],['Oignons','2'],['Ail','3 gousses'],['Beurre','50 g'],['Farine','2 c. à soupe'],['Bouquet garni','1'],['Oignons grelots','12']],
  prep:'Mariner le bœuf découpé 12h dans le vin avec carottes, oignons et bouquet garni. Égoutter, dorer la viande. Faire revenir lardons et légumes. Singer (fariner). Mouiller avec la marinade. Mijoter 3h à feu doux. 30 min avant : ajouter champignons sautés et oignons grelots glacés.',
  anec:'Ce plat de ménage bourguignon fut popularisé par Auguste Escoffier au XIXe siècle. Julia Child l\'a rendu célèbre auprès des Américains dans son émission "The French Chef" (1963). La recette figure dans son livre "Mastering the Art of French Cooking" (1961), véritable bible de la cuisine française aux États-Unis.'},
 en:{name:'Beef Bourguignon',sub:'Burgundy',
  ingr:[['Beef (chuck or cheek)','1.2 kg'],['Red Burgundy wine','75 cl'],['Smoked lardons','150 g'],['Button mushrooms','250 g'],['Carrots','3'],['Onions','2'],['Garlic','3 cloves'],['Butter','50 g'],['Flour','2 tbsp'],['Bouquet garni','1'],['Pearl onions','12']],
  prep:'Marinate diced beef 12h in wine with carrots, onions and bouquet garni. Drain, brown the meat. Sauté lardons and vegetables. Dust with flour. Deglaze with marinade. Simmer 3h on low heat. 30 min before: add sautéed mushrooms and glazed pearl onions.',
  anec:'This Burgundy household dish was popularized by Auguste Escoffier in the 19th century. Julia Child made it famous to Americans on her "The French Chef" show (1963). The recipe appears in her "Mastering the Art of French Cooking" (1961), the bible of French cuisine in the US.'}},
{id:4,emoji:'🧅',region:'paris',lat:48.85,lng:2.35,
 fr:{name:'Soupe à l\'Oignon',sub:'Paris, Île-de-France',
  ingr:[['Oignons','1 kg'],['Beurre','60 g'],['Vin blanc sec','15 cl'],['Bouillon de bœuf','1.5 l'],['Farine','2 c. à soupe'],['Pain de campagne','4 tranches'],['Gruyère râpé','150 g'],['Thym','2 brins'],['Laurier','1 feuille'],['Sel, poivre','']],
  prep:'Émincer finement les oignons. Les caraméliser 45 min à feu moyen dans le beurre en remuant souvent. Singer, déglacer au vin blanc. Ajouter bouillon, thym, laurier. Mijoter 20 min. Verser dans bols allant au four. Poser tranches de pain, couvrir de gruyère. Gratiner 10 min sous le gril.',
  anec:'Contrairement à la légende, la soupe à l\'oignon n\'a pas été inventée par Louis XV. Elle était déjà connue au Moyen Âge comme soupe des pauvres. Sa popularisation au XIXe siècle est liée aux Halles de Paris, où elle reconstituait les noctambules et les travailleurs de l\'aube au restaurant Au Pied de Cochon.'},
 en:{name:'French Onion Soup',sub:'Paris, Île-de-France',
  ingr:[['Onions','1 kg'],['Butter','60 g'],['Dry white wine','15 cl'],['Beef broth','1.5 l'],['Flour','2 tbsp'],['Country bread','4 slices'],['Grated Gruyère','150 g'],['Thyme','2 sprigs'],['Bay leaf','1'],['Salt, pepper','']],
  prep:'Thinly slice onions. Caramelize 45 min over medium heat in butter, stirring often. Dust with flour, deglaze with white wine. Add broth, thyme, bay leaf. Simmer 20 min. Pour into oven-safe bowls. Place bread slices, cover with Gruyère. Broil 10 min.',
  anec:'Despite the legend, onion soup was not invented by Louis XV. It was already known in the Middle Ages as a peasant soup. Its 19th century popularization is linked to Les Halles market in Paris, where it revived night owls and dawn workers at the restaurant Au Pied de Cochon.'}},
{id:5,emoji:'🥧',region:'est',lat:48.69,lng:6.18,
 fr:{name:'Quiche Lorraine',sub:'Nancy, Lorraine',
  ingr:[['Pâte brisée','1 fond'],['Lardons fumés','200 g'],['Œufs','3'],['Crème fraîche épaisse','25 cl'],['Lait','10 cl'],['Noix de muscade','1 pincée'],['Sel, poivre',''],['Beurre (pour le moule)','']],
  prep:'Préchauffer à 180°C. Foncer le moule beurré de pâte brisée, piquer le fond. Cuire à blanc 10 min. Faire revenir les lardons. Battre œufs, crème, lait, sel, poivre, muscade. Répartir les lardons sur le fond. Verser l\'appareil. Cuire 30 min jusqu\'à ce que la surface soit dorée et gonflée.',
  anec:'La quiche lorraine originale ne contenait pas de fromage — seulement lardons, œufs et crème. Le nom vient du mot allemand "Kuchen" (gâteau). La Lorraine a longtemps été sous influence germanique. La version avec gruyère est une adaptation parisienne du XXe siècle qui s\'est répandue dans le monde entier.'},
 en:{name:'Quiche Lorraine',sub:'Nancy, Lorraine',
  ingr:[['Shortcrust pastry','1 shell'],['Smoked lardons','200 g'],['Eggs','3'],['Thick crème fraîche','25 cl'],['Milk','10 cl'],['Nutmeg','1 pinch'],['Salt, pepper',''],['Butter (for pan)','']],
  prep:'Preheat to 180°C. Line buttered pan with pastry, prick base. Blind bake 10 min. Sauté lardons. Beat eggs, cream, milk, salt, pepper, nutmeg. Spread lardons on base. Pour custard. Bake 30 min until surface is golden and puffed.',
  anec:'The original Quiche Lorraine contained no cheese — only lardons, eggs and cream. The name comes from the German word "Kuchen" (cake). Lorraine was long under Germanic influence. The version with Gruyère is a 20th century Parisian adaptation that spread worldwide.'}},
{id:6,emoji:'🥞',region:'ouest',lat:48.11,lng:-1.68,
 fr:{name:'Crêpes Bretonnes',sub:'Bretagne',
  ingr:[['Farine de froment','250 g'],['Œufs','3'],['Lait','50 cl'],['Beurre fondu','50 g'],['Sel','1 pincée'],['Beurre salé (pour la cuisson)',''],['Sucre (facultatif)','']],
  prep:'Mélanger farine et sel. Creuser un puits, ajouter les œufs. Incorporer le lait progressivement en fouettant. Ajouter le beurre fondu. Reposer 1h. Cuire dans une crêpière beurrée à feu vif, 1 min par côté. Pour les galettes bretonnes (salées), remplacer la farine par de la farine de sarrasin.',
  anec:'La crêpe bretonne est indissociable de la Chandeleur (2 février) mais aussi de la culture celtique. La galette de sarrasin (blé noir) date du XIIe siècle, après le retour des croisades. Le blé noir, ramené d\'Orient, s\'adaptait parfaitement aux terres acides bretonnes. Les crêperies bretonnes ont colonisé le monde entier depuis les années 1970.'},
 en:{name:'Breton Crêpes',sub:'Brittany',
  ingr:[['Wheat flour','250 g'],['Eggs','3'],['Milk','50 cl'],['Melted butter','50 g'],['Salt','1 pinch'],['Salted butter (for cooking)',''],['Sugar (optional)','']],
  prep:'Mix flour and salt. Make a well, add eggs. Gradually whisk in milk. Add melted butter. Rest 1h. Cook in a buttered crêpe pan over high heat, 1 min per side. For buckwheat galettes (savoury), replace flour with buckwheat flour.',
  anec:'Breton crêpes are inseparable from Candlemas (February 2) and Celtic culture. The buckwheat galette dates from the 12th century, after the crusades. Buckwheat, brought from the East, adapted perfectly to Brittany\'s acidic soils. Breton crêperies have colonized the world since the 1970s.'}},
{id:7,emoji:'🥘',region:'sud-est',lat:43.7,lng:7.27,
 fr:{name:'Ratatouille',sub:'Nice, Provence-Alpes-Côte d\'Azur',
  ingr:[['Aubergines','2'],['Courgettes','2'],['Poivrons rouges','2'],['Tomates','4'],['Oignon','1'],['Ail','4 gousses'],['Huile d\'olive','8 c. à soupe'],['Herbes de Provence','1 c. à soupe'],['Basilic frais',''],['Sel, poivre','']],
  prep:'Couper tous les légumes en dés. Faire revenir séparément aubergines, courgettes et poivrons dans l\'huile. Faire suer oignon et ail, ajouter tomates. Réunir tous les légumes, assaisonner avec herbes de Provence. Mijoter 30 min. Pour la version tian (confit Byaldi), disposer en rondelles superposées et enfourner 1h30 à 140°C.',
  anec:'La ratatouille est mentionnée pour la première fois dans les écrits culinaires au XVIIIe siècle. Le mot vient du patois "ratatolha". Ce plat paysan utilisant les légumes d\'été du jardin est devenu l\'emblème de la cuisine méditerranéenne française. Le film Ratatouille (Pixar, 2007) lui a donné une renommée mondiale.'},
 en:{name:'Ratatouille',sub:'Nice, Provence-Alpes-Côte d\'Azur',
  ingr:[['Eggplant','2'],['Zucchini','2'],['Red bell peppers','2'],['Tomatoes','4'],['Onion','1'],['Garlic','4 cloves'],['Olive oil','8 tbsp'],['Herbes de Provence','1 tbsp'],['Fresh basil',''],['Salt, pepper','']],
  prep:'Dice all vegetables. Separately sauté eggplant, zucchini and peppers in oil. Sweat onion and garlic, add tomatoes. Combine all vegetables, season with herbes de Provence. Simmer 30 min. For the tian version (confit Byaldi), arrange in overlapping slices and bake 1h30 at 140°C.',
  anec:'Ratatouille is first mentioned in culinary writings in the 18th century. The word comes from the patois "ratatolha". This peasant dish using summer garden vegetables became the emblem of French Mediterranean cuisine. The Pixar film Ratatouille (2007) gave it worldwide fame.'}},
{id:8,emoji:'🥗',region:'sud-est',lat:43.7,lng:7.27,
 fr:{name:'Salade Niçoise',sub:'Nice, Côte d\'Azur',
  ingr:[['Thon au naturel','200 g'],['Anchois à l\'huile','8 filets'],['Tomates','3'],['Haricots verts cuits','150 g'],['Œufs durs','3'],['Olives noires niçoises','80 g'],['Poivron vert','1'],['Oignon rouge','1'],['Ail','1 gousse'],['Huile d\'olive, vinaigre','']],
  prep:'Frotter le saladier avec l\'ail. Disposer les tomates en quartiers, haricots verts, poivron en lanières, oignon en rondelles. Ajouter le thon émietté, les anchois, les œufs en quartiers, les olives. Assaisonner généreusement d\'huile d\'olive. Ne jamais cuire les légumes (sauf haricots). Pas de pommes de terre dans l\'originale.',
  anec:'La salade niçoise authentique ne contient ni pommes de terre ni haricots cuits selon les puristes de Nice. Elle naît au XIXe siècle comme simple salade de crudités du jardin niçois. La querelle entre les défenseurs de la recette traditionnelle et les "modernistes" fait rage. Le chef Jacques Médecin en établit la recette officielle dans son livre "La cuisine niçoise" (1972).'},
 en:{name:'Salade Niçoise',sub:'Nice, Côte d\'Azur',
  ingr:[['Tuna in water','200 g'],['Anchovies in oil','8 fillets'],['Tomatoes','3'],['Cooked green beans','150 g'],['Hard-boiled eggs','3'],['Niçoise black olives','80 g'],['Green pepper','1'],['Red onion','1'],['Garlic','1 clove'],['Olive oil, vinegar','']],
  prep:'Rub salad bowl with garlic. Arrange tomato wedges, green beans, pepper strips, sliced onion. Add flaked tuna, anchovies, egg quarters, olives. Season generously with olive oil. Never cook the vegetables (except beans). No potatoes in the original.',
  anec:'According to Nice purists, authentic salade niçoise contains neither potatoes nor cooked beans. It was born in the 19th century as a simple salad of fresh garden vegetables. The dispute between traditional recipe defenders and "modernists" rages on. Chef Jacques Médecin established the official recipe in "La cuisine niçoise" (1972).'}},
{id:9,emoji:'🍷',region:'est',lat:47.05,lng:4.83,
 fr:{name:'Œufs en Meurette',sub:'Bourgogne',
  ingr:[['Œufs','4'],['Vin rouge de Bourgogne','50 cl'],['Lardons','100 g'],['Champignons','150 g'],['Oignon','1'],['Ail','2 gousses'],['Beurre','40 g'],['Farine','1 c. à soupe'],['Pain de campagne grillé','4 tranches'],['Bouquet garni','1']],
  prep:'Faire réduire le vin de moitié avec oignon, ail, bouquet garni. Filtrer. Faire revenir lardons et champignons. Préparer un roux avec beurre et farine, mouiller avec le vin réduit. Mijoter 10 min pour obtenir une sauce veloutée. Pocher les œufs 3 min dans de l\'eau vinaigrée. Dresser sur croûtons frottés à l\'ail, napper de sauce meurette.',
  anec:'La meurette est une sauce bourguignonne au vin rouge qui accompagne traditionnellement œufs, poissons et escargots. Son nom vient peut-être du mot "muire" (saumure). Cette recette illustre l\'art bourguignon de cuisiner le vin rouge, au point que certains disent que "la Bourgogne mange ce qu\'elle boit". Paul Bocuse en proposait une version raffinée dans ses restaurants.'},
 en:{name:'Eggs in Red Wine Sauce',sub:'Burgundy',
  ingr:[['Eggs','4'],['Red Burgundy wine','50 cl'],['Lardons','100 g'],['Mushrooms','150 g'],['Onion','1'],['Garlic','2 cloves'],['Butter','40 g'],['Flour','1 tbsp'],['Toasted country bread','4 slices'],['Bouquet garni','1']],
  prep:'Reduce wine by half with onion, garlic, bouquet garni. Strain. Sauté lardons and mushrooms. Make a roux with butter and flour, add reduced wine. Simmer 10 min for a velvety sauce. Poach eggs 3 min in vinegared water. Serve on garlic-rubbed croutons, pour meurette sauce over.',
  anec:'Meurette is a Burgundian red wine sauce traditionally accompanying eggs, fish and snails. Its name may come from "muire" (brine). This recipe illustrates the Burgundian art of cooking with red wine, to the point some say "Burgundy eats what it drinks". Paul Bocuse offered a refined version in his restaurants.'}},
{id:10,emoji:'🦞',region:'ouest',lat:48.35,lng:-4.49,
 fr:{name:'Homard à l\'Armoricaine',sub:'Bretagne',
  ingr:[['Homard breton vivant','1 (700g)'],['Tomates','4'],['Oignon','1'],['Échalotes','3'],['Ail','3 gousses'],['Cognac','5 cl'],['Vin blanc sec','15 cl'],['Concentré de tomates','2 c. à soupe'],['Estragon',''],['Piment de Cayenne',''],['Beurre','60 g'],['Huile','']],
  prep:'Couper le homard vivant en morceaux. Faire chauffer huile et beurre, saisir les morceaux 5 min. Flamber au cognac. Retirer. Suer échalotes, oignon, ail. Ajouter tomates, concentré, vin blanc, piment, estragon. Remettre le homard, couvrir, cuire 20 min. Dresser le homard, réduire la sauce, monter au beurre.',
  anec:'Son nom prête à confusion : "armoricaine" vient d\'Armorique (l\'ancienne Bretagne). Mais selon l\'historien de la gastronomie Prosper Montagné, la recette aurait été inventée à Paris par Pierre Fraisse, chef d\'origine languedocienne, qui l\'aurait appelée "américaine" (pour sauce tomate pimentée). La Bretagne en revendique aujourd\'hui la paternité.'},
 en:{name:'Lobster Armoricaine',sub:'Brittany',
  ingr:[['Live Breton lobster','1 (700g)'],['Tomatoes','4'],['Onion','1'],['Shallots','3'],['Garlic','3 cloves'],['Cognac','5 cl'],['Dry white wine','15 cl'],['Tomato paste','2 tbsp'],['Tarragon',''],['Cayenne pepper',''],['Butter','60 g'],['Oil','']],
  prep:'Cut live lobster into pieces. Heat oil and butter, sear pieces 5 min. Flambé with cognac. Remove. Sweat shallots, onion, garlic. Add tomatoes, paste, white wine, pepper, tarragon. Return lobster, cover, cook 20 min. Plate lobster, reduce sauce, finish with butter.',
  anec:'Its name is confusing: "armoricaine" comes from Armorica (ancient Brittany). But gastronomy historian Prosper Montagné says the recipe was invented in Paris by Pierre Fraisse, a Languedocian chef, who called it "américaine" (for spiced tomato sauce). Brittany now claims its paternity.'}},


{id:11,emoji:'🥩',region:'centre',lat:46.8,lng:1.7,
 fr:{name:'Pot-au-Feu',sub:'Cuisine française classique',
  ingr:[['Jarret de bœuf','600 g'],['Plat de côtes','400 g'],['Os à moelle','4'],['Carottes','4'],['Navets','3'],['Poireaux','3'],['Céleri-rave','1/2'],['Oignon piqué de clous de girofle','1'],['Bouquet garni','1'],['Gros sel, poivre en grains','']],
  prep:'Plonger les viandes dans l\'eau froide avec l\'oignon piqué. Porter à ébullition, écumer. Ajouter les légumes et aromates. Cuire 3h à petit frémissement. 30 min avant la fin, ajouter les os à moelle enveloppés dans une gaze. Servir bouillon en entrée, puis viandes et légumes avec moutarde, cornichons et fleur de sel.',
  anec:'Le pot-au-feu est considéré comme le plat national français par excellence. Brillat-Savarin l\'appelait "le grand baromètre de la civilisation". Il était présent dans tous les foyers français du XVe au XXe siècle, mijotant des heures dans un pot posé sur les braises de la cheminée. Henri IV souhaitait que chaque Français puisse avoir "une poule au pot" le dimanche.'},
 en:{name:'Pot-au-Feu',sub:'Classic French cuisine',
  ingr:[['Beef shank','600 g'],['Short ribs','400 g'],['Marrow bones','4'],['Carrots','4'],['Turnips','3'],['Leeks','3'],['Celeriac','1/2'],['Onion studded with cloves','1'],['Bouquet garni','1'],['Coarse salt, peppercorns','']],
  prep:'Place meats in cold water with studded onion. Bring to boil, skim. Add vegetables and aromatics. Cook 3h at a gentle simmer. 30 min before end, add marrow bones wrapped in gauze. Serve broth as starter, then meats and vegetables with mustard, pickles and fleur de sel.',
  anec:'Pot-au-feu is considered France\'s national dish par excellence. Brillat-Savarin called it "the great barometer of civilization". It was present in every French home from the 15th to 20th century, simmering for hours in a pot on the fireplace embers. Henri IV wished every Frenchman could have "a chicken in the pot" on Sundays.'}},
{id:12,emoji:'🐟',region:'nord',lat:47.9,lng:0.22,
 fr:{name:'Matelote d\'Anguille',sub:'Val de Loire',
  ingr:[['Anguilles','1 kg'],['Vin rouge du Val de Loire','50 cl'],['Oignons','2'],['Échalotes','4'],['Ail','3 gousses'],['Champignons de Paris','200 g'],['Beurre','60 g'],['Farine','2 c. à soupe'],['Cognac','4 cl'],['Croûtons',''],['Persil frais','']],
  prep:'Tronçonner les anguilles. Les faire revenir dans le beurre 5 min. Flamber au cognac. Retirer. Suer oignons, échalotes, ail. Singer. Mouiller au vin rouge, ajouter les anguilles. Cuire 25 min. Faire revenir les champignons séparément. Réunir, rectifier l\'assaisonnement. Servir avec croûtons frits et persil haché.',
  anec:'La matelote désigne un ragoût de poissons d\'eau douce cuits au vin. La version à l\'anguille est typique du Val de Loire, où ces poissons peuplaient abondamment la Loire. L\'anguille est un poisson migrateur fascinant qui voyage de la Loire jusqu\'à la Mer des Sargasses pour se reproduire, puis revient. Sa population a décliné de 90% en 50 ans, la rendant aujourd\'hui menacée.'},
 en:{name:'Eel Matelote',sub:'Loire Valley',
  ingr:[['Eels','1 kg'],['Loire red wine','50 cl'],['Onions','2'],['Shallots','4'],['Garlic','3 cloves'],['Button mushrooms','200 g'],['Butter','60 g'],['Flour','2 tbsp'],['Cognac','4 cl'],['Croutons',''],['Fresh parsley','']],
  prep:'Cut eels into sections. Brown in butter 5 min. Flambé with cognac. Remove. Sweat onions, shallots, garlic. Dust with flour. Add red wine and eels. Cook 25 min. Sauté mushrooms separately. Combine, adjust seasoning. Serve with fried croutons and chopped parsley.',
  anec:'Matelote refers to a freshwater fish stew cooked in wine. The eel version is typical of the Loire Valley, where these fish abundantly populated the Loire. Eel is a fascinating migratory fish that travels from the Loire to the Sargasso Sea to reproduce, then returns. Its population has declined 90% in 50 years, making it endangered today.'}},
{id:13,emoji:'🦆',region:'sud-ouest',lat:43.6,lng:1.44,
 fr:{name:'Confit de Canard',sub:'Gascogne, Périgord',
  ingr:[['Cuisses de canard gras','4'],['Gros sel','80 g'],['Graisse de canard','600 g'],['Ail','4 gousses'],['Thym','3 brins'],['Laurier','2 feuilles'],['Poivre noir','1 c. à café']],
  prep:'Frotter les cuisses avec sel, ail écrasé, poivre, thym, laurier. Laisser mariner 12h au froid. Rincer, sécher. Faire fondre la graisse de canard à 80°C. Immerger les cuisses, cuire 2h30 à 80°C (la chair doit se détacher à l\'os). Conserver dans la graisse. Pour servir : dorer les cuisses à la poêle ou au four 200°C, 20 min, côté peau.',
  anec:'Le confit est une technique de conservation antérieure aux réfrigérateurs, née dans le Sud-Ouest pour préserver la viande tout l\'hiver. "Confire" vient du latin "conficere" (préparer, préserver). La tradition du canard gras dans le Périgord et la Gascogne est liée à la production du foie gras, le confit utilisant les morceaux restants. Certains confits vieillissent plusieurs mois dans la graisse.'},
 en:{name:'Duck Confit',sub:'Gascony, Périgord',
  ingr:[['Fat duck legs','4'],['Coarse salt','80 g'],['Duck fat','600 g'],['Garlic','4 cloves'],['Thyme','3 sprigs'],['Bay leaves','2'],['Black pepper','1 tsp']],
  prep:'Rub legs with salt, crushed garlic, pepper, thyme, bay leaf. Marinate 12h in cold. Rinse, dry. Melt duck fat to 80°C. Submerge legs, cook 2h30 at 80°C (meat should pull from bone). Store in fat. To serve: brown legs in pan or oven at 200°C, 20 min, skin side.',
  anec:'Confit is a preservation technique predating refrigerators, born in South-West France to preserve meat all winter. "Confire" comes from Latin "conficere" (prepare, preserve). The fatty duck tradition in Périgord and Gascony is linked to foie gras production, with confit using the remaining cuts. Some confits age several months in the fat.'}},
{id:14,emoji:'🍎',region:'ouest',lat:48.37,lng:1.37,
 fr:{name:'Tarte Tatin',sub:'Lamotte-Beuvron, Sologne',
  ingr:[['Pommes Golden ou Reinette','1.2 kg'],['Beurre demi-sel','100 g'],['Sucre','150 g'],['Pâte feuilletée ou brisée','1 rouleau'],['Vanille','1 gousse']],
  prep:'Beurrer généreusement un moule à manqué. Saupoudrer de sucre. Couper les pommes en quartiers épais, les disposer serrées dans le moule. Parsemer de noisettes de beurre et graines de vanille. Caraméliser 20 min sur feu moyen. Recouvrir de pâte en rentrant les bords. Cuire 30 min à 180°C. Attendre 5 min avant de retourner sur le plat.',
  anec:'La tarte Tatin doit son nom aux sœurs Stéphanie et Caroline Tatin, aubergistes à Lamotte-Beuvron au XIXe siècle. Selon la légende, Stéphanie, pressée, oublia la pâte et mit les pommes directement dans le moule beurré et sucré. Pour rattraper l\'erreur, elle posa la pâte par-dessus et retourna la tarte. Maxim\'s de Paris inscrit la recette à sa carte dans les années 1930.'},
 en:{name:'Tarte Tatin',sub:'Lamotte-Beuvron, Sologne',
  ingr:[['Golden or Reinette apples','1.2 kg'],['Salted butter','100 g'],['Sugar','150 g'],['Puff or shortcrust pastry','1 roll'],['Vanilla','1 pod']],
  prep:'Generously butter a cake pan. Sprinkle with sugar. Cut apples into thick wedges, arrange tightly in pan. Dot with butter and vanilla seeds. Caramelize 20 min over medium heat. Cover with pastry, tucking edges. Bake 30 min at 180°C. Wait 5 min before turning out onto a plate.',
  anec:'The tarte Tatin is named after sisters Stéphanie and Caroline Tatin, innkeepers at Lamotte-Beuvron in the 19th century. Legend says Stéphanie, in a hurry, forgot the pastry and put the apples directly in the buttered sugar pan. To fix the mistake, she placed the pastry on top and turned the tart upside down. Maxim\'s in Paris added it to their menu in the 1930s.'}},
{id:15,emoji:'🥬',region:'est',lat:48.58,lng:7.75,
 fr:{name:'Choucroute Garnie',sub:'Alsace',
  ingr:[['Choucroute crue','1 kg'],['Palette de porc fumée','500 g'],['Jarret de porc','1'],['Saucisses de Strasbourg','4'],['Saucisse Montbéliard','2'],['Lard fumé','200 g'],['Riesling','20 cl'],['Oignons','2'],['Pommes de terre','800 g'],['Baies de genièvre, laurier, clous de girofle','']],
  prep:'Faire revenir oignons dans le saindoux. Ajouter la choucroute rincée et essorée. Mouiller au Riesling, ajouter les épices. Enfouir les viandes fumées. Couvrir, cuire 2h à feu doux. Ajouter les pommes de terre 40 min avant la fin, les saucisses 15 min avant. Servir sur un grand plat.',
  anec:'La choucroute (du latin "Surkrut", chou acide) est connue en Alsace depuis le XVe siècle. Le chou fermenté était une source de vitamine C précieuse pendant l\'hiver. La "garnie" avec ses viandes est une version festive apparue au XIXe siècle. L\'Alsace étant passée de France à l\'Allemagne et vice-versa, la choucroute incarne cette identité culturelle hybride et revendiquée.'},
 en:{name:'Choucroute Garnie',sub:'Alsace',
  ingr:[['Raw sauerkraut','1 kg'],['Smoked pork shoulder','500 g'],['Pork knuckle','1'],['Strasbourg sausages','4'],['Montbéliard sausage','2'],['Smoked bacon','200 g'],['Riesling','20 cl'],['Onions','2'],['Potatoes','800 g'],['Juniper berries, bay leaf, cloves','']],
  prep:'Sauté onions in lard. Add rinsed, squeezed sauerkraut. Add Riesling and spices. Bury the smoked meats. Cover, cook 2h on low heat. Add potatoes 40 min before end, sausages 15 min before. Serve on a large platter.',
  anec:'Sauerkraut (from Latin "Surkrut", sour cabbage) has been known in Alsace since the 15th century. Fermented cabbage was a precious source of vitamin C during winter. The "garnie" version with meats is a festive version from the 19th century. With Alsace passing between France and Germany, choucroute embodies this hybrid and proudly claimed cultural identity.'}},
{id:16,emoji:'🪿',region:'sud-ouest',lat:44.84,lng:-0.57,
 fr:{name:'Foie Gras',sub:'Périgord, Gascogne',
  ingr:[['Foie gras de canard déveiné','500 g'],['Sel fin','8 g'],['Poivre blanc','2 g'],['Sucre','1 g'],['Sauternes ou Armagnac','2 c. à soupe']],
  prep:'Sortir le foie gras à température ambiante 1h. Assaisonner sel, poivre, sucre sur toutes les faces. Arroser d\'alcool. Reconstituer le foie, le rouler dans un film alimentaire très serré. Cuire en terrine au bain-marie à 90°C pendant 40 min. Refroidir, réfrigérer 48h minimum. Servir frais en tranches avec pain brioché et fleur de sel.',
  anec:'L\'engraissement forcé des oies (gavage) remonte à l\'Égypte ancienne (-2500 ans). Les Romains pratiquaient la "ficatum" (foie de figue). En France, c\'est Alsace et Gascogne qui développent cette tradition au XVIIIe siècle. Le foie gras d\'Alsace est à l\'oie, celui du Périgord et de Gascogne au canard. Son statut de "patrimoine gastronomique et culturel protégé de France" date de 2006.'},
 en:{name:'Foie Gras',sub:'Périgord, Gascony',
  ingr:[['Deveined duck foie gras','500 g'],['Fine salt','8 g'],['White pepper','2 g'],['Sugar','1 g'],['Sauternes or Armagnac','2 tbsp']],
  prep:'Bring foie gras to room temperature for 1h. Season with salt, pepper, sugar on all sides. Drizzle with alcohol. Reshape the liver, roll very tightly in cling film. Cook in a terrine in a water bath at 90°C for 40 min. Cool, refrigerate 48h minimum. Serve cold in slices with brioche bread and fleur de sel.',
  anec:'Force-feeding of geese (gavage) dates back to ancient Egypt (-2500 years). Romans practiced "ficatum" (fig-fattened liver). In France, Alsace and Gascony developed this tradition in the 18th century. Alsace foie gras uses goose, Périgord and Gascony use duck. Its status as "protected French gastronomic and cultural heritage" dates from 2006.'}},
{id:17,emoji:'🍮',region:'sud-est',lat:43.3,lng:5.37,
 fr:{name:'Crème Brûlée',sub:'Cuisine française classique',
  ingr:[['Crème fleurette (35%)','50 cl'],['Jaunes d\'œufs','5'],['Sucre','80 g'],['Gousse de vanille','1'],['Cassonade (pour le caramel)','4 c. à soupe']],
  prep:'Faire chauffer la crème avec la gousse de vanille fendue et grattée. Blanchir jaunes et sucre. Verser la crème chaude progressivement sur les jaunes en fouettant. Filtrer. Remplir des ramequins. Cuire au bain-marie à 100°C pendant 45 min. Réfrigérer 4h. Saupoudrer de cassonade, caraméliser au chalumeau.',
  anec:'La première recette écrite de crème brûlée apparaît dans le livre de cuisine français "Le Cuisinier Royal et Bourgeois" de François Massialot (1691). La Catalogne et l\'Angleterre (Trinity College) en revendiquent aussi l\'invention. En Espagne, la "crema catalana" (parfumée à la cannelle et au zeste de citron) est sa cousine. Le chalumeau de cuisine est devenu populaire dans les années 1980.'},
 en:{name:'Crème Brûlée',sub:'Classic French cuisine',
  ingr:[['Heavy cream (35%)','50 cl'],['Egg yolks','5'],['Sugar','80 g'],['Vanilla pod','1'],['Brown sugar (for caramel)','4 tbsp']],
  prep:'Heat cream with split, scraped vanilla pod. Whisk yolks and sugar until pale. Gradually pour hot cream over yolks, whisking. Strain. Fill ramekins. Bake in water bath at 100°C for 45 min. Refrigerate 4h. Sprinkle with brown sugar, caramelize with a torch.',
  anec:'The first written recipe for crème brûlée appears in François Massialot\'s French cookbook "Le Cuisinier Royal et Bourgeois" (1691). Catalonia and England (Trinity College) also claim its invention. In Spain, "crema catalana" (flavored with cinnamon and lemon zest) is its cousin. The kitchen torch became popular in the 1980s.'}},
{id:18,emoji:'🧁',region:'est',lat:48.76,lng:5.16,
 fr:{name:'Madeleines de Commercy',sub:'Lorraine',
  ingr:[['Farine','150 g'],['Sucre','150 g'],['Beurre fondu et refroidi','150 g'],['Œufs','3'],['Levure','1/2 sachet'],['Zeste de citron','1'],['Extrait de vanille','1 c. à café'],['Miel d\'acacia','1 c. à soupe']],
  prep:'Blanchir œufs et sucre. Incorporer farine tamisée et levure. Ajouter beurre fondu, zeste, vanille, miel. Reposer 1h au froid (crucial pour la bosse). Remplir les moules beurrés et farinés aux 2/3. Enfourner à 220°C pendant 4 min, puis baisser à 180°C pour 8 min. La bosse se forme lors du choc thermique.',
  anec:'Marcel Proust immortalise la madeleine dans "Du côté de chez Swann" (1913) : la bouchée de gâteau trempée dans du thé déclenche une mémoire involontaire et fait jaillir tout Combray. Cette "mémoire de la madeleine" est devenue la métaphore universelle de la mémoire sensorielle. La madeleine de Commercy aurait été créée au XVIIIe siècle par une jeune fille prénommée Madeleine au château de Commercy.'},
 en:{name:'Madeleines de Commercy',sub:'Lorraine',
  ingr:[['Flour','150 g'],['Sugar','150 g'],['Melted, cooled butter','150 g'],['Eggs','3'],['Baking powder','1/2 packet'],['Lemon zest','1'],['Vanilla extract','1 tsp'],['Acacia honey','1 tbsp']],
  prep:'Whisk eggs and sugar until pale. Fold in sifted flour and baking powder. Add melted butter, zest, vanilla, honey. Rest 1h in cold (crucial for the hump). Fill buttered, floured moulds 2/3 full. Bake at 220°C for 4 min, then reduce to 180°C for 8 min. The hump forms from thermal shock.',
  anec:'Marcel Proust immortalized the madeleine in "In Search of Lost Time" (1913): a bite of cake dipped in tea triggers involuntary memory, evoking all of Combray. This "madeleine moment" became the universal metaphor for sensory memory. The Commercy madeleine is said to have been created in the 18th century by a young woman named Madeleine at the Château de Commercy.'}},
{id:19,emoji:'🥐',region:'paris',lat:48.85,lng:2.35,
 fr:{name:'Croissant',sub:'Paris, Île-de-France',
  ingr:[['Farine T45','500 g'],['Beurre AOC (tourage)','250 g'],['Lait tiède','28 cl'],['Sucre','60 g'],['Sel','10 g'],['Levure fraîche de boulanger','20 g'],['Jaune d\'œuf + lait (dorure)','']],
  prep:'Pétrir farine, lait, sucre, sel, levure jusqu\'à obtenir une pâte lisse. Reposer 1h. Étaler le beurre froid en rectangle. Envelopper la pâte autour du beurre (tourage). Faire 3 tours doubles en pliant et étalant, en refroidissant 30 min entre chaque tour. Étaler en grand triangle, rouler en croissant. Dorer, laisser pousser 2h. Cuire 18 min à 180°C.',
  anec:'Le croissant n\'est pas français à l\'origine ! Le "Kipferl" autrichien existait depuis le XIIIe siècle. La version feuilletée est attribuée à August Zang, boulanger viennois qui ouvre une boulangerie à Paris vers 1838. Le croissant devient le symbole du "petit-déjeuner français" au XXe siècle. Aujourd\'hui, 80% des croissants vendus en France sont fabriqués à partir de pâtes surgelées industrielles.'},
 en:{name:'Croissant',sub:'Paris, Île-de-France',
  ingr:[['T45 flour','500 g'],['AOC butter (lamination)','250 g'],['Warm milk','28 cl'],['Sugar','60 g'],['Salt','10 g'],['Fresh baker\'s yeast','20 g'],['Egg yolk + milk (glaze)','']],
  prep:'Knead flour, milk, sugar, salt, yeast until smooth dough. Rest 1h. Shape cold butter into rectangle. Wrap dough around butter (lamination). Do 3 double folds, rolling and folding, cooling 30 min between each. Roll into large triangle, roll up into croissant shape. Glaze, prove 2h. Bake 18 min at 180°C.',
  anec:'The croissant did not originally come from France! The Austrian "Kipferl" existed since the 13th century. The laminated version is attributed to August Zang, a Viennese baker who opened a bakery in Paris around 1838. The croissant became the symbol of "French breakfast" in the 20th century. Today, 80% of croissants sold in France are made from industrial frozen dough.'}},
{id:20,emoji:'🐑',region:'ouest',lat:48.63,lng:-1.51,
 fr:{name:'Gigot d\'Agneau de 7 Heures',sub:'Normandie, Bretagne',
  ingr:[['Gigot d\'agneau','1 (2.5 kg)'],['Ail','8 gousses'],['Carottes','3'],['Oignons','3'],['Vin blanc','30 cl'],['Bouillon d\'agneau','30 cl'],['Thym, romarin, laurier',''],['Anchois à l\'huile','4 filets'],['Huile d\'olive',''],['Sel, poivre','']],
  prep:'Piquer le gigot d\'ail et anchois. Colorer sur toutes les faces dans une cocotte. Réserver. Faire revenir légumes. Déglacer au vin blanc. Remettre le gigot, ajouter bouillon et aromates. Couvrir hermétiquement (luter la cocotte avec pâte de farine si besoin). Cuire 7h à 140°C. La viande se défait à la cuillère.',
  anec:'La cuisson "7 heures" est une technique de braisage ultra-long qui attendrit les chairs les plus coriaces. Elle était pratiquée dans les grandes maisons bourgeoises du XIXe siècle qui disposaient de fours à chaleur constante. L\'agneau de pré-salé de la Baie du Mont-Saint-Michel est le plus réputé de France : il pâture dans les herbes salées des estrans, ce qui parfume naturellement sa viande.'},
 en:{name:'7-Hour Lamb Leg',sub:'Normandy, Brittany',
  ingr:[['Leg of lamb','1 (2.5 kg)'],['Garlic','8 cloves'],['Carrots','3'],['Onions','3'],['White wine','30 cl'],['Lamb stock','30 cl'],['Thyme, rosemary, bay leaf',''],['Anchovies in oil','4 fillets'],['Olive oil',''],['Salt, pepper','']],
  prep:'Lard leg with garlic and anchovies. Brown on all sides in a casserole. Set aside. Sauté vegetables. Deglaze with white wine. Return lamb, add stock and aromatics. Cover tightly (seal casserole with flour paste if needed). Cook 7h at 140°C. Meat falls apart with a spoon.',
  anec:'The "7-hour" cooking is an ultra-long braising technique that tenderizes the toughest meat. It was practiced in grand bourgeois homes of the 19th century with constant-heat ovens. Salt meadow lamb from Mont-Saint-Michel Bay is France\'s most prized: it grazes on salty shoreline grasses which naturally perfumes the meat.'}},


{id:21,emoji:'🧀',region:'est',lat:45.9,lng:6.12,
 fr:{name:'Fondue Savoyarde',sub:'Savoie',
  ingr:[['Comté râpé','200 g'],['Beaufort râpé','200 g'],['Emmental de Savoie râpé','200 g'],['Vin blanc de Savoie (Apremont)','35 cl'],['Ail','2 gousses'],['Maïzena','1 c. à soupe'],['Kirsch','4 cl'],['Noix de muscade',''],['Pain de campagne rassis','600 g']],
  prep:'Frotter le caquelon d\'ail. Chauffer le vin blanc. Ajouter les fromages progressivement en remuant en 8. Délayer la maïzena dans le kirsch, incorporer. Assaisonner. Maintenir à frémissement. Servir avec des cubes de pain rassis piqués sur des pics à fondue. La tradition veut que celui qui perd son pain paie une bouteille.',
  anec:'La fondue savoyarde est née par nécessité dans les alpages : en hiver, les fromages durcissaient et devenaient difficiles à manger directement. Les bergers les fondaient avec du vin blanc local. Le caquelon (poêlon en terre cuite) est indispensable pour maintenir la chaleur. La popularisation touristique de la fondue date des années 1950 avec l\'essor des sports d\'hiver en Savoie.'},
 en:{name:'Savoyard Fondue',sub:'Savoie',
  ingr:[['Grated Comté','200 g'],['Grated Beaufort','200 g'],['Grated Savoie Emmental','200 g'],['Savoie white wine (Apremont)','35 cl'],['Garlic','2 cloves'],['Cornstarch','1 tbsp'],['Kirsch','4 cl'],['Nutmeg',''],['Stale country bread','600 g']],
  prep:'Rub the caquelon with garlic. Heat white wine. Add cheeses gradually, stirring in a figure-8. Mix cornstarch in kirsch, incorporate. Season. Keep at a gentle simmer. Serve with stale bread cubes on fondue forks. Tradition says whoever drops their bread into the pot buys a bottle.',
  anec:'Savoyard fondue was born from necessity in the alpine pastures: in winter, cheeses hardened and became difficult to eat directly. Shepherds melted them with local white wine. The caquelon (earthenware pot) is essential for maintaining heat. The tourist popularization of fondue dates from the 1950s with the rise of winter sports in Savoie.'}},
{id:22,emoji:'🍗',region:'est',lat:47.05,lng:4.83,
 fr:{name:'Coq au Vin',sub:'Bourgogne',
  ingr:[['Coq ou poulet fermier découpé','1.5 kg'],['Vin rouge de Bourgogne','75 cl'],['Lardons','150 g'],['Champignons de Paris','250 g'],['Oignons grelots','16'],['Ail','4 gousses'],['Beurre','60 g'],['Farine','2 c. à soupe'],['Cognac','4 cl'],['Bouquet garni','1'],['Persil','']],
  prep:'Mariner le poulet 12h dans le vin avec ail et bouquet garni. Égoutter, sécher. Dorer les morceaux dans le beurre. Flamber au cognac. Retirer. Faire revenir lardons, ajouter la farine, mouiller avec la marinade. Remettre le poulet, cuire 1h30 à couvert. Ajouter champignons sautés et oignons glacés 30 min avant.',
  anec:'La légende prête au général Vercingétorix l\'invention de ce plat : il aurait envoyé un vieux coq coriace à César en signe de défi, qui l\'aurait fait mijoter dans du vin gaulois. Historiquement fantaisiste, mais la recette est bien bourguignonne et daterait du Moyen Âge. Julia Child en a fait son plat fétiche, le préparant en direct à la télévision américaine dès 1963.'},
 en:{name:'Coq au Vin',sub:'Burgundy',
  ingr:[['Rooster or free-range chicken, cut up','1.5 kg'],['Red Burgundy wine','75 cl'],['Lardons','150 g'],['Button mushrooms','250 g'],['Pearl onions','16'],['Garlic','4 cloves'],['Butter','60 g'],['Flour','2 tbsp'],['Cognac','4 cl'],['Bouquet garni','1'],['Parsley','']],
  prep:'Marinate chicken 12h in wine with garlic and bouquet garni. Drain, dry. Brown pieces in butter. Flambé with cognac. Remove. Sauté lardons, add flour, deglaze with marinade. Return chicken, cook 1h30 covered. Add sautéed mushrooms and glazed onions 30 min before.',
  anec:'Legend attributes the invention to General Vercingetorix: he supposedly sent a tough old rooster to Caesar as a sign of defiance, who had it simmered in Gallic wine. Historically fantastical, but the recipe is genuinely Burgundian and may date from the Middle Ages. Julia Child made it her signature dish, preparing it live on American television from 1963.'}},
{id:23,emoji:'🫧',region:'centre',lat:48.0,lng:2.5,
 fr:{name:'Soufflé au Fromage',sub:'Cuisine française classique',
  ingr:[['Gruyère râpé','120 g'],['Beurre','40 g'],['Farine','40 g'],['Lait','25 cl'],['Œufs (jaunes + blancs)','4'],['Moutarde de Dijon','1 c. à café'],['Noix de muscade',''],['Sel, poivre',''],['Parmesan (pour chemiser)','30 g']],
  prep:'Préchauffer à 200°C. Beurrer et chemiser les moules de parmesan. Préparer une béchamel épaisse. Hors du feu, ajouter gruyère, jaunes, moutarde, muscade. Monter les blancs en neige ferme avec une pincée de sel. Incorporer délicatement en 3 fois. Remplir les moules aux 3/4. Cuire 12-15 min SANS OUVRIR LE FOUR. Servir immédiatement.',
  anec:'Le soufflé est l\'une des préparations les plus redoutées de la cuisine française, synonyme de défi technique pour les apprentis cuisiniers. Son nom vient du verbe "souffler" (gonfler). Il fut popularisé par Marie-Antoine Carême au XIXe siècle. La règle d\'or : "on attend le soufflé, le soufflé n\'attend pas." Sa fragilité en a fait le symbole de l\'angoisse culinaire.'},
 en:{name:'Cheese Soufflé',sub:'Classic French cuisine',
  ingr:[['Grated Gruyère','120 g'],['Butter','40 g'],['Flour','40 g'],['Milk','25 cl'],['Eggs (yolks + whites)','4'],['Dijon mustard','1 tsp'],['Nutmeg',''],['Salt, pepper',''],['Parmesan (for lining)','30 g']],
  prep:'Preheat to 200°C. Butter and line moulds with parmesan. Make a thick béchamel. Off heat, add Gruyère, yolks, mustard, nutmeg. Whip egg whites to stiff peaks with a pinch of salt. Gently fold in 3 additions. Fill moulds 3/4 full. Bake 12-15 min WITHOUT OPENING THE OVEN. Serve immediately.',
  anec:'The soufflé is one of the most dreaded preparations in French cuisine, synonymous with technical challenge for apprentice cooks. Its name comes from "souffler" (to puff). It was popularized by Marie-Antoine Carême in the 19th century. The golden rule: "you wait for the soufflé, the soufflé does not wait." Its fragility made it the symbol of culinary anxiety.'}},
{id:24,emoji:'🦆',region:'sud-ouest',lat:43.94,lng:1.35,
 fr:{name:'Magret de Canard',sub:'Périgord, Quercy',
  ingr:[['Magrets de canard gras','2'],['Miel','2 c. à soupe'],['Sauce soja','1 c. à soupe'],['Vinaigre balsamique','2 c. à soupe'],['Fleur de sel',''],['Poivre du moulin',''],['Thym frais','']],
  prep:'Quadriller la peau des magrets au couteau sans entamer la chair. Assaisonner. Déposer côté peau dans une poêle froide. Monter à feu moyen-fort. Cuire 8-10 min jusqu\'à peau dorée et croustillante. Retourner, cuire 3-4 min côté chair (rosé). Reposer 5 min sous aluminium. Mélanger miel, soja, vinaigre pour la sauce. Servir en tranches avec la sauce chauffée.',
  anec:'Le magret (de l\'occitan "maigret", poitrine maigre) est la poitrine du canard gras élevé pour le foie gras. Sa générosité en gras intramusculaire le rapproche d\'une entrecôte. Ce morceau "inventé" dans les années 1960 par André Daguin, chef aveyronnais, était auparavant considéré comme sous-produit. Daguin eut l\'idée de le cuire comme une viande rouge, révolutionnant la gastronomie du Périgord.'},
 en:{name:'Duck Magret',sub:'Périgord, Quercy',
  ingr:[['Fat duck breast (magret)','2'],['Honey','2 tbsp'],['Soy sauce','1 tbsp'],['Balsamic vinegar','2 tbsp'],['Fleur de sel',''],['Freshly ground pepper',''],['Fresh thyme','']],
  prep:'Score the skin in a crosshatch pattern without cutting into the flesh. Season. Place skin-side down in a cold pan. Bring to medium-high heat. Cook 8-10 min until skin is golden and crispy. Turn, cook 3-4 min flesh side (pink). Rest 5 min under foil. Mix honey, soy, vinegar for sauce. Serve sliced with warmed sauce.',
  anec:'Magret (from Occitan "maigret", lean breast) is the breast of a duck raised for foie gras. Its generous intramuscular fat makes it close to a ribeye steak. This cut "invented" in the 1960s by André Daguin, an Aveyron chef, was previously considered a by-product. Daguin had the idea to cook it like red meat, revolutionizing Périgord gastronomy.'}},
{id:25,emoji:'🧆',region:'est',lat:47.32,lng:5.04,
 fr:{name:'Gougères',sub:'Bourgogne',
  ingr:[['Farine','150 g'],['Beurre','80 g'],['Eau','25 cl'],['Œufs','4'],['Gruyère ou Comté râpé','120 g'],['Sel','1 c. à café'],['Moutarde de Dijon','1 c. à café'],['Poivre, noix de muscade','']],
  prep:'Faire bouillir eau, beurre, sel. Hors du feu, verser farine d\'un coup. Mélanger vigoureusement. Remettre sur feu doux 2 min pour dessécher. Incorporer les œufs un à un. Ajouter fromage, moutarde, poivre, muscade. Former des petites boules à la poche à douille sur plaque beurrée. Dorer au jaune d\'œuf. Cuire 25 min à 180°C sans ouvrir.',
  anec:'La gougère est une pâte à choux fromagée qui accompagne traditionnellement la dégustation des vins de Bourgogne. Servie à l\'apéritif chez les vignerons, elle permet de couvrir le palais avant de déguster les vins. Chablis et Auxerre en revendiquent l\'invention. La recette moderne date du XIXe siècle. C\'est l\'amuse-bouche incontournable de la gastronomie bourguignonne.'},
 en:{name:'Gougères',sub:'Burgundy',
  ingr:[['Flour','150 g'],['Butter','80 g'],['Water','25 cl'],['Eggs','4'],['Grated Gruyère or Comté','120 g'],['Salt','1 tsp'],['Dijon mustard','1 tsp'],['Pepper, nutmeg','']],
  prep:'Boil water, butter, salt. Off heat, add flour all at once. Stir vigorously. Return to low heat 2 min to dry out. Incorporate eggs one by one. Add cheese, mustard, pepper, nutmeg. Pipe small balls onto a buttered tray. Glaze with egg yolk. Bake 25 min at 180°C without opening.',
  anec:'Gougère is a cheese choux pastry traditionally served with Burgundy wine tastings. Served as an aperitif at winemakers, it coats the palate before tasting wines. Chablis and Auxerre both claim its invention. The modern recipe dates from the 19th century. It is the quintessential amuse-bouche of Burgundian gastronomy.'}},
{id:26,emoji:'🥩',region:'paris',lat:48.85,lng:2.35,
 fr:{name:'Tartare de Bœuf',sub:'Paris, Cuisine française classique',
  ingr:[['Bœuf (rumsteck ou filet) haché minute','500 g'],['Câpres','2 c. à soupe'],['Cornichons','4'],['Oignon rouge','1 petit'],['Moutarde de Dijon','1 c. à soupe'],['Sauce Worcestershire','1 c. à café'],['Tabasco','quelques gouttes'],['Jaune d\'œuf','1'],['Persil, ciboulette',''],['Huile d\'olive','']],
  prep:'Hacher la viande au couteau en petits dés (jamais au hachoir électrique). Mixer câpres, cornichons, oignon finement. Mélanger délicatement viande, moutarde, Worcestershire, Tabasco, huile. Incorporer les condiments hachés. Dresser en cercle, creuser un puits, y déposer le jaune d\'œuf. Servir aussitôt avec frites et salade.',
  anec:'Contrairement à son nom, le tartare n\'a rien d\'exotique : la viande crue est consommée en Europe depuis l\'Antiquité. Son association avec les peuples turco-mongols (Tatars) viendrait d\'un mythe romantique du XIXe siècle. C\'est Auguste Escoffier qui codifie la recette moderne vers 1900. Le Steak tartare est devenu l\'emblème du bistrot parisien, avec son rituel d\'assaisonnement à la table.'},
 en:{name:'Beef Tartare',sub:'Paris, Classic French cuisine',
  ingr:[['Beef (rump or tenderloin), hand-chopped','500 g'],['Capers','2 tbsp'],['Cornichons','4'],['Red onion','1 small'],['Dijon mustard','1 tbsp'],['Worcestershire sauce','1 tsp'],['Tabasco','a few drops'],['Egg yolk','1'],['Parsley, chives',''],['Olive oil','']],
  prep:'Dice meat with a knife into small pieces (never use electric mincer). Finely mince capers, cornichons, onion. Gently mix meat, mustard, Worcestershire, Tabasco, oil. Fold in chopped condiments. Shape in a ring, make a well, place egg yolk in center. Serve immediately with fries and salad.',
  anec:'Despite its name, tartare has nothing exotic: raw meat has been eaten in Europe since antiquity. Its association with Turco-Mongol peoples (Tatars) stems from a 19th century romantic myth. Auguste Escoffier codified the modern recipe around 1900. Steak tartare became the emblem of the Parisian bistrot, with its ritual tableside seasoning.'}},
{id:27,emoji:'🌭',region:'est',lat:48.58,lng:4.36,
 fr:{name:'Andouillette de Troyes',sub:'Champagne-Ardenne',
  ingr:[['Andouillettes de Troyes (AAAAA)','4'],['Moutarde de Reims','2 c. à soupe'],['Crème fraîche','15 cl'],['Échalotes','3'],['Beurre','30 g'],['Vin blanc de Champagne','10 cl'],['Thym, laurier',''],['Sel, poivre','']],
  prep:'Inciser légèrement les andouillettes. Les faire colorer dans le beurre 5 min. Réserver. Dans la même poêle, suer les échalotes. Déglacer au vin blanc. Ajouter crème, moutarde. Remettre les andouillettes, cuire 10 min à feu doux. La sauce doit napper les andouillettes. Servir avec une purée de pommes de terre.',
  anec:'L\'andouillette de Troyes est protégée par l\'AAAAA (Association Amicale des Amateurs d\'Andouillette Authentique), fondée en 1970, qui décerne son label aux charcuteries d\'excellence. C\'est une charcuterie rustique et puissante, à base d\'intestins de porc préparés selon une recette ancestrale troyenne. Son parfum prononcé en fait un produit de terroir très clivant... mais ses amateurs sont indéfectibles.'},
 en:{name:'Andouillette de Troyes',sub:'Champagne-Ardenne',
  ingr:[['Troyes andouillettes (AAAAA)','4'],['Reims mustard','2 tbsp'],['Crème fraîche','15 cl'],['Shallots','3'],['Butter','30 g'],['Champagne white wine','10 cl'],['Thyme, bay leaf',''],['Salt, pepper','']],
  prep:'Lightly score the andouillettes. Brown in butter 5 min. Set aside. In same pan, sweat shallots. Deglaze with white wine. Add cream, mustard. Return andouillettes, cook 10 min on low heat. Sauce should coat the sausages. Serve with mashed potatoes.',
  anec:'The Troyes andouillette is protected by the AAAAA (Friendly Association of Authentic Andouillette Lovers), founded in 1970, which awards its label to excellence charcuteries. It is a rustic, powerful charcuterie made from pork intestines prepared according to an ancestral Troyes recipe. Its strong aroma makes it a very divisive terroir product... but its fans are unwavering.'}},
{id:28,emoji:'🍲',region:'centre',lat:48.0,lng:2.5,
 fr:{name:'Blanquette de Veau',sub:'Cuisine française classique',
  ingr:[['Épaule de veau','1 kg'],['Carottes','3'],['Oignons','2'],['Céleri','2 branches'],['Champignons de Paris','200 g'],['Beurre','60 g'],['Farine','40 g'],['Crème fraîche','20 cl'],['Jaunes d\'œufs','2'],['Citron','1'],['Bouquet garni, clous de girofle','']],
  prep:'Blanchir le veau à l\'eau froide, égoutter. Recouvrir d\'eau froide avec légumes, aromates. Cuire 1h30 à frémissement. Préparer un roux blanc avec beurre et farine, délayer avec le bouillon. Ajouter champignons. Lier hors du feu avec jaunes et crème. Citronner. Ne JAMAIS faire bouillir après la liaison. Servir avec riz pilaf.',
  anec:'La blanquette, dont le nom évoque la blancheur de la sauce, est l\'un des plats symboles de la cuisine bourgeoise française. Elle figure dans les livres de cuisine depuis le XVIIIe siècle. Son nom vient de "blanc" : viande non saisie, sauce blanche liée à la crème. C\'est le plat que Proust aimait manger chez sa tante Léonie, selon certains commentateurs de son œuvre.'},
 en:{name:'Blanquette de Veau',sub:'Classic French cuisine',
  ingr:[['Veal shoulder','1 kg'],['Carrots','3'],['Onions','2'],['Celery','2 stalks'],['Button mushrooms','200 g'],['Butter','60 g'],['Flour','40 g'],['Crème fraîche','20 cl'],['Egg yolks','2'],['Lemon','1'],['Bouquet garni, cloves','']],
  prep:'Blanch veal in cold water, drain. Cover with cold water, add vegetables and aromatics. Cook 1h30 at a simmer. Make a white roux with butter and flour, thin with broth. Add mushrooms. Thicken off heat with yolks and cream. Add lemon juice. NEVER boil after thickening. Serve with pilaf rice.',
  anec:'Blanquette, whose name evokes the whiteness of the sauce, is one of the symbols of French bourgeois cuisine. It appears in cookbooks since the 18th century. Its name comes from "blanc": unseared meat, white sauce bound with cream. Some commentators of his work say it was the dish Proust loved to eat at his aunt Léonie\'s.'}},
{id:29,emoji:'🥗',region:'est',lat:45.74,lng:4.83,
 fr:{name:'Salade Lyonnaise',sub:'Lyon, Rhône-Alpes',
  ingr:[['Frisée (chicorée)','1 belle tête'],['Lardons fumés','150 g'],['Œufs','4'],['Croûtons aillés','100 g'],['Vinaigre de vin rouge','3 c. à soupe'],['Moutarde','1 c. à café'],['Huile de noix','3 c. à soupe'],['Échalote','1'],['Sel, poivre',''],['Vinaigre blanc (pochage)','']],
  prep:'Laver et essorer la frisée. Faire revenir les lardons. Préparer une vinaigrette avec moutarde, vinaigre rouge, huile de noix, échalote. Pocher les œufs 3 min dans de l\'eau vinaigrée frémissante. Dans la poêle des lardons, déglacer au vinaigre rouge. Dresser la salade, ajouter lardons chauds, croûtons, œuf poché par-dessus. Napper de vinaigrette.',
  anec:'La salade lyonnaise est le plat emblématique des bouchons lyonnais, ces restaurants typiques de la capitale de la gastronomie française. Lyon doit sa réputation culinaire à Paul Bocuse mais aussi aux "Mères lyonnaises", cuisinières legendaires du XIXe-XXe siècles comme Mère Brazier (première triple étoilée Michelin femme, 1933). Le bouchon est inseparable de la culture ouvrière et canut (tisserand) de Lyon.'},
 en:{name:'Lyonnaise Salad',sub:'Lyon, Rhône-Alpes',
  ingr:[['Frisée (curly endive)','1 large head'],['Smoked lardons','150 g'],['Eggs','4'],['Garlic croutons','100 g'],['Red wine vinegar','3 tbsp'],['Mustard','1 tsp'],['Walnut oil','3 tbsp'],['Shallot','1'],['Salt, pepper',''],['White vinegar (poaching)','']],
  prep:'Wash and dry frisée. Sauté lardons. Make vinaigrette with mustard, red wine vinegar, walnut oil, shallot. Poach eggs 3 min in simmering vinegared water. In lardon pan, deglaze with red wine vinegar. Plate salad, add hot lardons, croutons, place poached egg on top. Drizzle with vinaigrette.',
  anec:'Lyonnaise salad is the emblematic dish of Lyon\'s bouchons, the typical restaurants of France\'s gastronomic capital. Lyon owes its culinary reputation to Paul Bocuse but also to the "Mères lyonnaises", legendary female cooks of the 19th-20th centuries like Mère Brazier (first triple Michelin-starred woman, 1933). The bouchon is inseparable from Lyon\'s working-class and canuts (silk weavers) culture.'}},
{id:30,emoji:'🍒',region:'centre',lat:45.77,lng:3.08,
 fr:{name:'Clafoutis aux Cerises',sub:'Limousin, Corrèze',
  ingr:[['Cerises noires entières (non dénoyautées)','500 g'],['Œufs','3'],['Farine','60 g'],['Sucre','100 g'],['Lait','30 cl'],['Crème fraîche','5 cl'],['Beurre fondu','30 g'],['Kirsch','1 c. à soupe'],['Sucre glace',''],['Sel','1 pincée']],
  prep:'Préchauffer à 180°C. Beurrer généreusement un plat. Répartir les cerises non dénoyautées (les noyaux parfument). Battre œufs, sucre, sel. Incorporer farine tamisée, lait, crème, beurre fondu, kirsch. Verser sur les cerises. Cuire 35-40 min jusqu\'à coloration dorée et gonflement. Saupoudrer de sucre glace, servir tiède.',
  anec:'Le clafoutis (du dialecte occitan "clafir", remplir) est le dessert emblématique du Limousin, région réputée pour ses cerises noires. Selon la tradition, on ne dénoyaute JAMAIS les cerises : les noyaux libèrent un arôme d\'amande amère à la cuisson. Hors saison, on le prépare avec des pruneaux (flognarde) ou des pommes. La recette figure dans Larousse Gastronomique depuis 1938.'},
 en:{name:'Cherry Clafoutis',sub:'Limousin, Corrèze',
  ingr:[['Whole black cherries (with pits)','500 g'],['Eggs','3'],['Flour','60 g'],['Sugar','100 g'],['Milk','30 cl'],['Crème fraîche','5 cl'],['Melted butter','30 g'],['Kirsch','1 tbsp'],['Powdered sugar',''],['Salt','1 pinch']],
  prep:'Preheat to 180°C. Generously butter a baking dish. Spread unpitted cherries (pits add flavor). Whisk eggs, sugar, salt. Fold in sifted flour, milk, cream, melted butter, kirsch. Pour over cherries. Bake 35-40 min until golden and puffed. Dust with powdered sugar, serve warm.',
  anec:'Clafoutis (from Occitan "clafir", to fill) is the emblematic dessert of Limousin, a region renowned for its black cherries. By tradition, cherries are NEVER pitted: the pits release a bitter almond aroma during cooking. Out of season, it\'s made with prunes (flognarde) or apples. The recipe has appeared in Larousse Gastronomique since 1938.'}},


{id:31,emoji:'🐟',region:'sud-est',lat:43.64,lng:3.87,
 fr:{name:'Brandade de Morue',sub:'Nîmes, Languedoc',
  ingr:[['Morue salée (dessalée 48h)','600 g'],['Huile d\'olive','15 cl'],['Lait entier','10 cl'],['Ail','3 gousses'],['Persil',''],['Croûtons aillés',''],['Poivre noir','']],
  prep:'Dessaler la morue 48h en changeant l\'eau 4 fois. La pocher 10 min dans de l\'eau frémissante. Égoutter, effeuiller en enlevant peaux et arêtes. Dans une casserole, travailler la morue à la spatule en incorporant alternativement huile tiède et lait chaud, comme une mayonnaise. Assaisonner. Servir tiède avec croûtons ou en gratin.',
  anec:'La brandade vient du provençal "brandar" (remuer). La morue salée, importée de Scandinavie et du Canada depuis le XVe siècle, permettait de se nourrir en période de carême catholique. Nîmes et Marseille se disputent la paternité de la brandade. La version nîmoise (sans pommes de terre) est la plus authentique. La version avec pommes de terre, popularisée à Paris, est une adaptation du XIXe siècle.'},
 en:{name:'Brandade de Morue',sub:'Nîmes, Languedoc',
  ingr:[['Salt cod (desalted 48h)','600 g'],['Olive oil','15 cl'],['Whole milk','10 cl'],['Garlic','3 cloves'],['Parsley',''],['Garlic croutons',''],['Black pepper','']],
  prep:'Desalt cod 48h, changing water 4 times. Poach 10 min in simmering water. Drain, flake removing skin and bones. In a saucepan, work cod with a spatula, alternately incorporating warm oil and hot milk, like making mayonnaise. Season. Serve warm with croutons or as a gratin.',
  anec:'Brandade comes from Provençal "brandar" (to stir). Salt cod, imported from Scandinavia and Canada since the 15th century, allowed eating during Catholic Lent. Nîmes and Marseille dispute its paternity. The Nîmes version (without potatoes) is most authentic. The potato version, popularized in Paris, is a 19th century adaptation.'}},
{id:32,emoji:'🐌',region:'est',lat:47.05,lng:4.83,
 fr:{name:'Escargots de Bourgogne',sub:'Bourgogne',
  ingr:[['Escargots de Bourgogne (cuits)','36'],['Beurre d\'ail persillé (beurre+ail+persil+échalote)','200 g'],['Ail','6 gousses'],['Persil plat','1 bouquet'],['Échalotes','2'],['Sel, poivre',''],['Coquilles (pour service)','36']],
  prep:'Préparer le beurre en mixant beurre mou, ail écrasé, persil haché, échalotes, sel, poivre. Placer un escargot dans chaque coquille. Remplir généreusement de beurre persillé. Disposer les coquilles dans un plat à escargots. Cuire 12 min à 220°C jusqu\'à ce que le beurre bouillonne et dore. Servir avec pain de campagne.',
  anec:'L\'escargot est consommé en France depuis la préhistoire (ossements dans les grottes). Les Romains les élevaient en "cochlearia". L\'escargot de Bourgogne (Helix pomatia) est le plus gros et le plus renommé, mais sa collecte est réglementée. La recette avec beurre à l\'ail et persil est codifiée au XIXe siècle. La France est le premier consommateur mondial d\'escargots (40 000 tonnes/an).'},
 en:{name:'Burgundy Snails',sub:'Burgundy',
  ingr:[['Burgundy snails (cooked)','36'],['Garlic-parsley butter (butter+garlic+parsley+shallot)','200 g'],['Garlic','6 cloves'],['Flat parsley','1 bunch'],['Shallots','2'],['Salt, pepper',''],['Shells (for serving)','36']],
  prep:'Make butter by mixing soft butter, crushed garlic, chopped parsley, shallots, salt, pepper. Place one snail in each shell. Fill generously with parsley butter. Arrange shells in an escargot dish. Bake 12 min at 220°C until butter bubbles and browns. Serve with country bread.',
  anec:'Snails have been eaten in France since prehistory (bones in caves). Romans kept them in "cochlearia" enclosures. Burgundy snails (Helix pomatia) are the largest and most prized, but their collection is regulated. The garlic-parsley butter recipe was codified in the 19th century. France is the world\'s top snail consumer (40,000 tonnes/year).'}},
{id:33,emoji:'🎂',region:'ouest',lat:48.11,lng:-1.68,
 fr:{name:'Paris-Brest',sub:'Île-de-France, Bretagne',
  ingr:[['Pâte à choux','(eau 25cl, beurre 80g, farine 150g, œufs 4)'],['Amandes effilées','50 g'],['Crème mousseline praliné','(crème pâtissière 30cl + beurre 200g + praliné 100g)'],['Sucre glace',''],['Jaune d\'œuf (dorure)','']],
  prep:'Réaliser la pâte à choux. Pocher en couronne sur plaque. Dorer, parsemer d\'amandes. Cuire 35 min à 180°C. Ouvrir en deux. Monter la crème mousseline : travailler le beurre en pommade, incorporer progressivement la crème pâtissière froide et le praliné. Garnir généreusement la couronne. Refermer, saupoudrer de sucre glace.',
  anec:'Le Paris-Brest fut créé en 1910 par le pâtissier Louis Durand à Maisons-Laffitte, à la demande de Pierre Giffard, organisateur de la course cycliste Paris-Brest-Paris (535 km). La forme de couronne évoque une roue de vélo. Cette course créée en 1891 est la plus vieille épreuve cycliste au monde encore disputée (tous les 4 ans). Le Paris-Brest est devenu l\'une des pâtisseries françaises les plus aimées.'},
 en:{name:'Paris-Brest',sub:'Île-de-France, Brittany',
  ingr:[['Choux pastry','(water 25cl, butter 80g, flour 150g, eggs 4)'],['Sliced almonds','50 g'],['Praline mousseline cream','(custard 30cl + butter 200g + praline 100g)'],['Powdered sugar',''],['Egg yolk (glaze)','']],
  prep:'Make choux pastry. Pipe in a ring on baking tray. Glaze, scatter almonds. Bake 35 min at 180°C. Slice in half horizontally. Make mousseline cream: beat butter to pomade, gradually incorporate cold custard and praline. Generously fill the ring. Close, dust with powdered sugar.',
  anec:'The Paris-Brest was created in 1910 by pastry chef Louis Durand in Maisons-Laffitte, at the request of Pierre Giffard, organizer of the Paris-Brest-Paris cycling race (535 km). The ring shape evokes a bicycle wheel. This race, created in 1891, is the oldest cycling event still contested (every 4 years). The Paris-Brest has become one of France\'s most beloved pastries.'}},
{id:34,emoji:'🐑',region:'centre',lat:48.0,lng:2.5,
 fr:{name:'Navarin d\'Agneau Printanier',sub:'Cuisine française classique',
  ingr:[['Épaule d\'agneau découpée','1 kg'],['Navets nouveaux','300 g'],['Carottes nouvelles','300 g'],['Petits pois frais','200 g'],['Pommes de terre grenailles','300 g'],['Oignons nouveaux','8'],['Ail','3 gousses'],['Tomates concassées','200 g'],['Bouillon d\'agneau','50 cl'],['Bouquet garni','1']],
  prep:'Dorer les morceaux d\'agneau. Retirer. Faire revenir oignons et ail. Singer, ajouter tomates et bouillon. Remettre la viande, couvrir, cuire 45 min. Ajouter navets et carottes, cuire 20 min. Ajouter pommes de terre, cuire 15 min. Ajouter petits pois les 5 dernières minutes. Rectifier l\'assaisonnement. Parsemer de persil.',

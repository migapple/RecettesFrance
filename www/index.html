}

function showTab(name){
  curTab=name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  ['map','list','favs','shopping','quiz','settings'].forEach(n=>{
    document.getElementById('tab-'+n+'-content').style.display=n===name?'':'none';
  });
  const main=document.getElementById('main-area');
  if(name==='map'){
    main.style.overflow='hidden';
    document.getElementById('tab-map-content').style.height='100%';
    setTimeout(()=>{ if(map)map.invalidateSize(); },100);
  } else {
    main.style.overflow='';
    if(name==='quiz')renderQuiz();
    if(name==='favs')renderFavs();
    if(name==='shopping')renderShopping();
    if(name==='settings')renderSettings();
  }
}

function renderFilters(){
  const bar=document.getElementById('filter-bar');
  const fl=t('filter-labels');
  const regions=['all','paris','nord','ouest','est','sud-ouest','sud-est','centre'];
  bar.innerHTML='';
  regions.forEach(r=>{
    const b=document.createElement('button');
    b.className='filter-btn'+(r===curFilter?' active':'');
    b.textContent=r==='all'?t('all'):(fl[r]||r);
    b.onclick=()=>{curFilter=r;renderFilters();renderList();};
    bar.appendChild(b);
  });
}

function getRecipeData(r){return r[curLang]||r.fr}

function renderList(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const list=document.getElementById('recipe-list');
  const cb=document.getElementById('clear-btn');
  cb.style.display=q?'flex':'none';
  let items=RECIPES;
  if(curFilter!=='all')items=items.filter(r=>r.region===curFilter);
  if(q)items=items.filter(r=>{
    const d=getRecipeData(r);
    return d.name.toLowerCase().includes(q)||d.sub.toLowerCase().includes(q);
  });
  list.innerHTML='';
  items.forEach(r=>{
    const d=getRecipeData(r);
    const isFav=favorites.includes(r.id);
    const card=document.createElement('div');
    card.className='recipe-card';
    const thumbUrl=PHOTOS[r.id];
    const thumbHtml=thumbUrl
      ?`<img class="recipe-thumb" src="${thumbUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`
      :`<div class="recipe-thumb-placeholder">${r.emoji}</div>`;
    card.innerHTML=`${thumbHtml}
      <div class="recipe-info">
        <div class="recipe-name">${d.name}</div>
        <div class="recipe-meta">${d.sub}</div>
        <div class="recipe-region-tag">${t('filter-labels')[r.region]||r.region}</div>
      </div>
      <div class="fav-heart" data-id="${r.id}">${isFav?'❤️':'🤍'}</div>`;
    card.querySelector('.fav-heart').addEventListener('click',e=>{e.stopPropagation();toggleFav(r.id);});
    card.addEventListener('click',()=>openDetail(r));
    list.appendChild(card);
  });
  if(!items.length){list.innerHTML='<div class="empty-state"><span class="big">🔍</span>Aucune recette trouvée</div>';}
}

function filterList(){renderList();}
function clearSearch(){document.getElementById('search-input').value='';renderList();}

function toggleFav(id){
  const i=favorites.indexOf(id);
  if(i>-1)favorites.splice(i,1);else favorites.push(id);
  localStorage.setItem('recettes_favs',JSON.stringify(favorites));
  renderList();
  if(curTab==='favs')renderFavs();
  if(curTab==='shopping')renderShopping();
  if(curRecipe&&curRecipe.id===id){
    document.getElementById('d-fav').textContent=favorites.includes(id)?'❤️':'🤍';
  }
}

function renderFavs(){
  const list=document.getElementById('favs-list');
  const favItems=RECIPES.filter(r=>favorites.includes(r.id));
  list.innerHTML='';
  if(!favItems.length){
    list.innerHTML=`<div class="empty-state"><span class="big">💔</span>${t('fav-empty')}<br><small>${t('fav-empty2')}</small></div>`;
    return;
  }
  favItems.forEach(r=>{
    const d=getRecipeData(r);
    const card=document.createElement('div');
    card.className='recipe-card';
    const thumbUrl2=PHOTOS[r.id];
    const thumbHtml2=thumbUrl2
      ?`<img class="recipe-thumb" src="${thumbUrl2}" alt="" loading="lazy" onerror="this.style.display='none'">`
      :`<div class="recipe-thumb-placeholder">${r.emoji}</div>`;
    card.innerHTML=`${thumbHtml2}
      <div class="recipe-info">
        <div class="recipe-name">${d.name}</div>
        <div class="recipe-meta">${d.sub}</div>
      </div>
      <div class="fav-heart" data-id="${r.id}">❤️</div>`;
    card.querySelector('.fav-heart').addEventListener('click',e=>{e.stopPropagation();toggleFav(r.id);renderFavs();});
    card.addEventListener('click',()=>openDetail(r));
    list.appendChild(card);
  });
}

// SHOPPING LIST
let shoppingChecked={};

function getShoppingChecked(){
  try{return JSON.parse(localStorage.getItem('recettes_shopping_checked'))||{};}catch(e){return {};}
}
function saveShoppingChecked(){
  try{localStorage.setItem('recettes_shopping_checked',JSON.stringify(shoppingChecked));}catch(e){}
}

function renderShopping(){
  shoppingChecked=getShoppingChecked();
  const list=document.getElementById('shopping-list');
  const sub=document.getElementById('shopping-sub');
  const favItems=RECIPES.filter(r=>favorites.includes(r.id));
  list.innerHTML='';
  if(!favItems.length){
    sub.textContent='';
    list.innerHTML=`<div class="empty-state"><span class="big">🛒</span>${t('shopping-empty')}<br><small>${t('shopping-empty2')}</small></div>`;
    return;
  }
  let totalIngr=0;
  favItems.forEach(r=>favItems&&(totalIngr+=getRecipeData(r).ingr.length));
  sub.textContent=`${totalIngr} ${t('shopping-sub-n')} ${favItems.length} ${t('shopping-sub-recipes')}`;
  favItems.forEach(r=>{
    const d=getRecipeData(r);
    const groupTitle=document.createElement('div');
    groupTitle.className='shopping-recipe-title';
    groupTitle.innerHTML=`${r.emoji} ${d.name}`;
    list.appendChild(groupTitle);
    d.ingr.forEach(([name,qty],idx)=>{
      const key=r.id+'_'+idx;
      const isChecked=!!shoppingChecked[key];
      const item=document.createElement('div');
      item.className='shopping-item'+(isChecked?' checked':'');
      item.innerHTML=`<div class="shopping-checkbox${isChecked?' checked':''}" data-key="${key}">${isChecked?'✓':''}</div>
        <div class="shopping-item-text">${name}</div>
        <div class="shopping-item-qty">${qty||''}</div>`;
      item.querySelector('.shopping-checkbox').addEventListener('click',()=>toggleShoppingItem(key));
      list.appendChild(item);
    });
  });
}

function toggleShoppingItem(key){
  shoppingChecked[key]=!shoppingChecked[key];
  saveShoppingChecked();
  renderShopping();
}

function buildShoppingText(){
  const favItems=RECIPES.filter(r=>favorites.includes(r.id));
  let txt=(curLang==='fr'?'Liste de courses':'Shopping list')+'\n\n';
  favItems.forEach(r=>{
    const d=getRecipeData(r);
    txt+=r.emoji+' '+d.name+'\n';
    d.ingr.forEach(([name,qty])=>{
      txt+='  • '+name+(qty?' — '+qty:'')+'\n';
    });
    txt+='\n';
  });
  return txt;
}

function shareAsText(){
  const txt=buildShoppingText();
  if(navigator.share){
    navigator.share({title:curLang==='fr'?'Liste de courses':'Shopping list',text:txt}).catch(()=>{fallbackCopy(txt);});
  } else {
    fallbackCopy(txt);
  }
}

function fallbackCopy(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{
      alert(curLang==='fr'?'Liste copiée !':'List copied!');
    }).catch(()=>{});
  }
}

function openDetail(r){
  curRecipe=r;curPortions=4;
  renderDetail(r);
  document.getElementById('detail-panel').style.display='block';
}

function renderDetail(r){
  const d=getRecipeData(r);
  document.getElementById('d-name').textContent=d.name;
  document.getElementById('d-sub').textContent=d.sub;
  try{
    const photoWrap=document.getElementById('d-photo-wrap');
    const bigUrl=PHOTOS[r.id];
    if(bigUrl){
      photoWrap.innerHTML=`<img class="detail-photo" src="${bigUrl}" alt="" onerror="this.parentNode.innerHTML='<div class=detail-photo-placeholder>${r.emoji}</div>'">`;
      document.getElementById('d-emoji').style.display='none';
    } else {
      photoWrap.innerHTML='';
      document.getElementById('d-emoji').style.display='block';
      document.getElementById('d-emoji').textContent=r.emoji;
    }
  }catch(e){ console.error('Photo render error:',e); }
  document.getElementById('d-fav').textContent=favorites.includes(r.id)?'❤️':'🤍';
  document.getElementById('d-ingr-title').textContent=t('ingr');
  document.getElementById('d-prep-title').textContent=t('prep');
  document.getElementById('d-anec-title').textContent=t('anec');
  document.getElementById('d-prep').textContent=d.prep;
  document.getElementById('d-anec').textContent=d.anec;
  updatePortions();
}

function updatePortions(){
  if(!curRecipe)return;
  const d=getRecipeData(curRecipe);
  const base=4;
  document.getElementById('portions-val').textContent=curPortions+' '+(curPortions>1?t('persons'):t('person'));
  const ul=document.getElementById('d-ingr-list');
  ul.innerHTML='';
  d.ingr.forEach(([name,qty])=>{
    const li=document.createElement('li');
    let scaledQty=qty;
    if(qty){
      const num=parseFloat(qty.replace(',','.'));
      if(!isNaN(num)){
        const scaled=(num*curPortions/base);
        const rounded=Math.round(scaled*10)/10;
        scaledQty=qty.replace(num.toString().replace('.',','),rounded.toString().replace('.',','));
        scaledQty=qty.replace(num,rounded%1===0?rounded:rounded);
      }
    }
    li.innerHTML=`<span>${name}</span><span>${scaledQty}</span>`;
    ul.appendChild(li);
  });
}

function adjPortions(d){
  curPortions=Math.max(1,Math.min(20,curPortions+d));
  updatePortions();
}

function toggleFavDetail(){
  if(curRecipe)toggleFav(curRecipe.id);
}

function closeDetail(){
  document.getElementById('detail-panel').style.display='none';
  curRecipe=null;
}

// QUIZ
function renderQuiz(){
  const wrap=document.getElementById('quiz-wrap');
  if(!quizQ.length){
    quizQ=[...RECIPES].sort(()=>Math.random()-.5).slice(0,10);
    quizIdx=0;quizScore=0;
  }
  if(quizIdx>=quizQ.length){
    wrap.innerHTML=`<div class="quiz-result">
      <div class="quiz-score">${t('quiz-result')}</div>
      <div class="quiz-score-big" style="font-family:'IM Fell English',serif;font-size:48px;color:var(--gold)">${quizScore}/10</div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--muted2);margin:12px 0">${quizScore>=8?t('quiz-excellent'):quizScore>=5?t('quiz-bien'):t('quiz-revoir')}</div>
      <button class="quiz-restart" onclick="quizQ=[];renderQuiz()">${t('quiz-again')}</button>
    </div>`;
    return;
  }
  const r=quizQ[quizIdx];
  const d=getRecipeData(r);
  // generate 4 options including correct answer
  const correctRegion=r.region;
  const allRegions=['paris','nord','ouest','est','sud-ouest','sud-est','centre'];
  const fl=t('filter-labels');
  const others=allRegions.filter(x=>x!==correctRegion).sort(()=>Math.random()-.5).slice(0,3);
  const opts=[correctRegion,...others].sort(()=>Math.random()-.5);
  quizAnswered=false;
  wrap.innerHTML=`<div class="quiz-score">${t('quiz-score')}: ${quizScore}/${quizIdx}</div>
    <div class="quiz-card">
      <div class="quiz-emoji">${r.emoji}</div>
      <div class="quiz-question">${d.name}</div>
      <div class="quiz-hint" style="font-style:italic;color:var(--muted)">${t('quiz-q')}</div>
      <div class="quiz-opts">
        ${opts.map(o=>`<button class="quiz-opt" onclick="answerQuiz(this,'${o}','${correctRegion}')">${fl[o]||o}</button>`).join('')}
      </div>
      <button class="quiz-next" id="quiz-next-btn" onclick="quizIdx++;renderQuiz()">${t('quiz-next')}</button>
    </div>`;
}

function answerQuiz(btn,chosen,correct){
  if(quizAnswered)return;
  quizAnswered=true;
  document.querySelectorAll('.quiz-opt').forEach(b=>{
    const val=b.getAttribute('onclick').split("'")[1];
    if(val===correct)b.classList.add('correct');
    else b.classList.add('wrong');
    b.disabled=true;
  });
  if(chosen===correct)quizScore++;
  document.getElementById('quiz-next-btn').style.display='block';
}

// MAP
function initMap(){
  if(map)return;
  map=L.map('map',{zoomControl:true}).setView([46.8,2.3],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors',maxZoom:18
  }).addTo(map);
  markersLayer=L.layerGroup().addTo(map);
  RECIPES.forEach(r=>{
    const icon=L.divIcon({html:`<div style="font-size:24px;line-height:1">${r.emoji}</div>`,iconSize:[30,30],className:''});
    const m=L.marker([r.lat,r.lng],{icon}).addTo(markersLayer);
    const d=getRecipeData(r);
    m.on('click',()=>{
      document.getElementById('map-info').textContent=d.name+' — '+d.sub;
      setTimeout(()=>openDetail(r),200);
    });
  });
}

      const span=document.createElement('span');
      span.textContent=app.name;
      item.appendChild(img);item.appendChild(span);
      container.appendChild(item);
    });
  });
}

// INIT
window.addEventListener('DOMContentLoaded',()=>{
  try{favorites=JSON.parse(localStorage.getItem('recettes_favs'))||[];}catch(e){favorites=[];}

  applyLang();
  renderFilters();
  renderList();
  // Init map
  setTimeout(()=>{
    const script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
    script.onload=initMap;
    document.head.appendChild(script);
  },100);
});
</script>
